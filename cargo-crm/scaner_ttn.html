        // «📝 Заповнити»:
        //   • невідомий ТТН → scan_ttn створює лід, потім inline-редактор
        //   • знайдений ТТН → одразу inline-редактор (лід уже є)
        // У обох випадках save в редакторі поставить scan_status='checked'
        // і lead_status='ready' (якщо був unknown) → лід у «В перевірці».
        function checkActionFill() {
            var ttn = _camState.ttn;
            var count = _camState.count;
            if (!TENANT_ID) {
                showToast({ variant: 'error', icon: '❌', label: 'Немає сесії',
                            value: ttn, status: 'Увійдіть у CRM заново' });
                setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2500);
                closeCheckActionMenu();
                resumeAfterSheet();
                return;
            }
            // Знайдений — просто відкриваємо редактор, БЕЗ scan_ttn
            if (!_camState.isUnknown && _camState.pkg_id) {
                openInlineEditor(_camState.pkg_id, ttn);
                return;
            }
            // Невідомий — створюємо лід і далі редактор
            sb.rpc('scan_ttn', {
                p_tenant_id: TENANT_ID, p_ttn: ttn,
                p_direction: DEFAULT_DIRECTION, p_user: USER_LOGIN
            }).then(function(result) {
                if (result.error || !result.data || !result.data.ok) {
                    var msg = (result.error && result.error.message) ||
                              (result.data && result.data.error) || 'невідома причина';
                    showToast({ variant: 'error', icon: '❌', label: 'Не вдалось створити лід',
                                value: ttn, status: String(msg) });
                    setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 3000);
                    closeCheckActionMenu();
                    resumeAfterSheet();
                    return;
                }
                var newPkg = result.data.pkg_id;
                if (!newPkg) {
                    showToast({ variant: 'error', icon: '⚠️', label: 'Лід не створено',
                                value: ttn, status: 'pkg_id порожній' });
                    setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 3000);
                    closeCheckActionMenu();
                    resumeAfterSheet();
                    return;
                }
                // Якщо stepper був >1 — PATCH np_places, потім відкриваємо редактор
                var patchPromise = Promise.resolve();
                if (count > 1) {
                    patchPromise = fetch(SUPABASE_URL + '/rest/v1/packages' +
                              '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                              '&pkg_id=eq.' + encodeURIComponent(newPkg), {
                        method: 'PATCH',
                        headers: {
                            apikey: SUPABASE_ANON_KEY,
                            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                            'Content-Type': 'application/json',
                            Prefer: 'return=minimal'
                        },
                        body: JSON.stringify({ np_places: count })
                    }).catch(function(){});
                }
                patchPromise.then(function() {
                    _sessionScans[ttn] = (_sessionScans[ttn] || 0) + 1;
                    // Відразу відкриваємо редактор для цього нового ліда
                    openInlineEditor(newPkg, ttn);
                });
            }).catch(function(err) {
                showToast({ variant: 'error', icon: '❌', label: 'Мережа',
                            value: ttn, status: String(err && err.message || err) });
                setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 3000);
                closeCheckActionMenu();
                resumeAfterSheet();
            });
        }

        function checkActionPrimary() {
            var ttn = _camState.ttn;
            var pkg = _camState.pkg_id;
            var count = _camState.count;
            var isUnknown = _camState.isUnknown;

            if (isUnknown) {
                // Зберегти невідомого: scan_ttn створює pkg, далі PATCH item_count
                if (!TENANT_ID) {
                    showToast({ variant: 'error', icon: '❌', label: 'Немає сесії',
                                value: ttn, status: 'Увійдіть у CRM заново' });
                    setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2500);
                    closeCheckActionMenu();
                    resumeAfterSheet();
                    return;
                }
                sb.rpc('scan_ttn', {
                    p_tenant_id: TENANT_ID,
                    p_ttn: ttn,
                    p_direction: DEFAULT_DIRECTION,
                    p_user: USER_LOGIN
                }).then(function(result) {
                    // ── Помилка на рівні транспорту (PostgREST) ──
                    if (result.error) {
                        console.error('[scan_ttn] RPC error:', result.error);
                        showToast({ variant: 'error', icon: '❌', label: 'Помилка scan_ttn',
                                    value: ttn, status: String(result.error.message || result.error) });
                        setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 3500);
                        closeCheckActionMenu();
                        resumeAfterSheet();
                        return;
                    }
                    var r = (result && result.data) || {};
                    // ── Помилка всередині RPC (tenant validation, direction, тощо) ──
                    if (!r.ok) {
                        console.error('[scan_ttn] !ok:', r);
                        showToast({ variant: 'error', icon: '❌', label: 'Не збережено',
                                    value: ttn, status: String(r.error || 'невідома причина') });
                        setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 3500);
                        closeCheckActionMenu();
                        resumeAfterSheet();
                        return;
                    }
                    var newPkg = r.pkg_id || null;
                    var pendingCount = count > 1 ? count : null;
                    console.log('[scan_ttn] OK, pkg_id=', newPkg, 'type=', r.type, 'ttn=', ttn, 'tenant=', TENANT_ID);

                    // Якщо треба задати кількість місць НП — PATCH np_places
                    var countPromise = Promise.resolve(true);
                    if (newPkg && pendingCount) {
                        countPromise = fetch(SUPABASE_URL + '/rest/v1/packages' +
                                  '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                                  '&pkg_id=eq.' + encodeURIComponent(newPkg), {
                            method: 'PATCH',
                            headers: {
                                apikey: SUPABASE_ANON_KEY,
                                Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                                'Content-Type': 'application/json',
                                Prefer: 'return=minimal'
                            },
                            body: JSON.stringify({ np_places: pendingCount })
                        }).then(function(pr) {
                            console.log('[PATCH np_places]', pendingCount, 'ok=', pr.ok, 'status=', pr.status);
                            return pr.ok;
                        });
                    }

                    countPromise.then(function() {
                        // ── Верифікація: читаємо рядок за pkg_id (а не ttn) ──
                        // Так ми оминаємо можливі розбіжності через btrim/пробіли
                        // у ttn, або зміну ttn з боку тригерів.
                        if (!newPkg) return [];
                        return fetch(SUPABASE_URL + '/rest/v1/packages' +
                                  '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                                  '&pkg_id=eq.' + encodeURIComponent(newPkg) +
                                  '&select=pkg_id,ttn_number,lead_status,np_places,is_archived', {
                            headers: {
                                apikey: SUPABASE_ANON_KEY,
                                Authorization: 'Bearer ' + SUPABASE_ANON_KEY
                            }
                        }).then(function(r) { return r.json(); });
                    }).then(function(rows) {
                        console.log('[verify] rows=', rows);
                        var row = Array.isArray(rows) && rows[0];
                        if (!row || !row.pkg_id) {
                            showToast({ variant: 'error', icon: '⚠️',
                                        label: 'Лід не знайдено після збереження',
                                        value: ttn, status: 'pkg=' + (newPkg || '?') + ' · tenant=' + (TENANT_ID || '?') });
                            setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 4500);
                        } else {
                            lastScannedPkgId = row.pkg_id;
                            lastScannedTtn   = ttn;
                            // editBtn видалено; НП-оплата тепер у cam-actions
                            // Додаємо в сесійний набір, щоб повторний скан розпізнав дубль
                            _sessionScans[ttn] = (_sessionScans[ttn] || 0) + 1;
                            showToast({ variant: 'success', icon: '✅',
                                        label: 'Збережено як Невідомий',
                                        value: ttn, status: row.pkg_id + ' · Місць НП: ' + (row.np_places || 1) });
                            setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2200);
                            // Якщо історія відкрита — перезавантажуємо список
                            if (document.getElementById('hdOverlay').classList.contains('open')) {
                                refreshHistory();
                            }
                            // Показуємо кнопку історії
                            document.getElementById('historyDbBtn').style.display = '';
                        }
                    }).catch(function(err) {
                        console.error('[verify after save] failed:', err);
                        showToast({ variant: 'error', icon: '❌', label: 'Помилка верифікації',
                                    value: ttn, status: String(err && err.message || err) });
                        setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 3000);
                    }).finally(function() {
                        closeCheckActionMenu();
                        resumeAfterSheet();
                    });
                }).catch(function(err) {
                    console.error('[scan_ttn] network/promise error:', err);
                    showToast({ variant: 'error', icon: '❌', label: 'Мережа',
                                value: ttn, status: String(err && err.message || err) });
                    setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 3000);
                    closeCheckActionMenu();
                    resumeAfterSheet();
                });
            } else {
                // Знайдений ТТН — два варіанти:
                //   • scan_status !== 'checked' → primary = «В перевірку»
                //     (PATCH scan_status='checked', камера далі)
                //   • scan_status === 'checked' → primary = «Редагувати»
                //     (inline-редактор як раніше)
                if (!pkg) { closeCheckActionMenu(); resumeAfterSheet(); return; }
                if (_camState.scanStatus === 'checked') {
                    openInlineEditor(pkg, ttn);
                } else {
                    // «🔍 В перевірку»: один PATCH, тост, resume
                    fetch(SUPABASE_URL + '/rest/v1/packages' +
                          '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                          '&pkg_id=eq.' + encodeURIComponent(pkg), {
                        method: 'PATCH',
                        headers: {
                            apikey: SUPABASE_ANON_KEY,
                            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                            'Content-Type': 'application/json',
                            Prefer: 'return=minimal'
                        },
                        body: JSON.stringify({ scan_status: 'checked' })
                    }).then(function(r) {
                        if (!r.ok) {
                            showToast({ variant: 'error', icon: '❌', label: 'Не переведено',
                                        value: ttn, status: 'HTTP ' + r.status });
                            setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2500);
                        } else {
                            showToast({ variant: 'success', icon: '🔍',
                                        label: 'У «В перевірці»', value: ttn,
                                        status: 'scan_status = checked' });
                            setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 1800);
                        }
                    }).catch(function(){}).finally(function() {
                        closeCheckActionMenu();
                        resumeAfterSheet();
                    });
                }
            }
        }

        function getActiveFieldCols() {
            try {
                var raw = localStorage.getItem(_fieldsStorageKey());
                if (raw) {
                    var arr = JSON.parse(raw);
                    if (Array.isArray(arr) && arr.length) return arr;
                }
            } catch(_) {}
            // Дефолт — 11 стартових полів
            return FIELD_CATALOG.filter(function(f) { return f.defaultOn; })
                                .map(function(f) { return f.col; });
        }

        function setActiveFieldCols(cols) {
            try {
                localStorage.setItem(_fieldsStorageKey(), JSON.stringify(cols));
            } catch(_) {}
        }

            try { localStorage.removeItem(_fieldsStorageKey()); } catch(_) {}
            renderFieldsChooser();

        function _buildFieldElement(f) {
            // Повертає DOM-елемент .inl-row із відповідним контролом
            var row = document.createElement('div');
            row.className = 'inl-row';
            row.setAttribute('data-field', f.col);

            var label = document.createElement('label');
            label.textContent = f.label;
            if (f.required) {
                var req = document.createElement('span');
                req.className = 'req'; req.textContent = '*';
                label.appendChild(req);
            }
            row.appendChild(label);

            var el;
            if (f.type === 'textarea') {
                el = document.createElement('textarea');
                el.rows = 2;
            } else if (f.type === 'select') {
                el = document.createElement('select');
                (f.opts || []).forEach(function(o) {
                    var opt = document.createElement('option');
                    opt.value = o.value; opt.textContent = o.label;
                    el.appendChild(opt);
                });
            } else if (f.type === 'int') {
                el = document.createElement('input');
                el.type = 'number'; el.min = '0'; el.inputMode = 'numeric';
            } else if (f.type === 'float') {
                el = document.createElement('input');
                el.type = 'number'; el.min = '0'; el.step = '0.01'; el.inputMode = 'decimal';
            } else if (f.type === 'date') {
                el = document.createElement('input');
                el.type = 'date';
            } else {
                el = document.createElement('input');
                el.type = 'text';
            }
            el.id = 'inl_col_' + f.col;
            row.appendChild(el);
            return row;
        }

        function renderInlineFields() {
            var body = document.getElementById('inlBody');
            // Видаляємо всі попередні .inl-row/.inl-timeline (hidden pkgId input лишається)
            Array.prototype.slice.call(body.querySelectorAll('.inl-row, .inl-grid2, .inl-timeline'))
                 .forEach(function(n) { n.remove(); });

            var activeCols = getActiveFieldCols();
            // Зберігаємо порядок каталогу (не за порядком юзера — просто фільтр)
            FIELD_CATALOG.forEach(function(f) {
                if (activeCols.indexOf(f.col) === -1) return;
                body.appendChild(_buildFieldElement(f));
            });
        }

        function _renderInlineTimeline(pkgId, npPlaces) {
            // Показує історію скан-подій цього pkg (intake + unpack події)
            // коли np_places > 1. Тягне з package_scan_log по pkg_id.
            var body = document.getElementById('inlBody');
            // Прибираємо попередній timeline якщо був
            var old = body.querySelector('.inl-timeline');
            if (old) old.remove();

            if (!pkgId || !TENANT_ID || !(parseInt(npPlaces, 10) > 1)) return;

            var url = SUPABASE_URL + '/rest/v1/package_scan_log' +
                      '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                      '&pkg_id=eq.' + encodeURIComponent(pkgId) +
                      '&mode=in.(intake,unpack)' +
                      '&order=scanned_at.asc&limit=50' +
                      '&select=scanned_at,scanned_by,mode,outcome';
            fetch(url, {
                headers: {
                    apikey: SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + SUPABASE_ANON_KEY
                }
            }).then(function(r) { return r.json(); })
              .then(function(rows) {
                if (!Array.isArray(rows) || !rows.length) return;
                var block = document.createElement('div');
                block.className = 'inl-timeline';
                var title = document.createElement('div');
                title.className = 'inl-timeline-title';
                title.textContent = '📥 Розпаковки (' + rows.length + ')';
                block.appendChild(title);
                rows.forEach(function(r, i) {
                    var d = new Date(r.scanned_at);
                    var time = isNaN(d.getTime()) ? r.scanned_at :
                        d.toLocaleString('uk-UA', { day: '2-digit', month: '2-digit',
                            hour: '2-digit', minute: '2-digit' });
                    var item = document.createElement('div');
                    item.className = 'inl-timeline-item';
                    var label = (i === 0 ? '1-а (перша)' : (i+1) + '-а');
                    item.innerHTML = '• ' + label + ' ' + _escHtml(r.scanned_by || '?') +
                                     '<span class="inl-timeline-time">' + _escHtml(time) + '</span>';
                    block.appendChild(item);
                });
                // Вставляємо timeline на самий верх (перед першим .inl-row)
                var firstRow = body.querySelector('.inl-row');
                if (firstRow) body.insertBefore(block, firstRow);
                else body.appendChild(block);
              }).catch(function(){});
        }

        function openInlineEditor(pkgId, ttn) {
            if (!pkgId || !TENANT_ID) return;
            document.getElementById('inl_pkgId').value = pkgId;
            document.getElementById('inlTitleTtn').textContent = ttn || pkgId;

            // Перебудовуємо поля згідно з вибором оператора (localStorage)
            renderInlineFields();
            var activeCols = getActiveFieldCols();

            // Підтягуємо свіжий рядок з БД — активні колонки + завжди
            // lead_status і np_places (для авто-переходу при збереженні і
            // для timeline розпаковок).
            var selCols = activeCols.slice();
            if (selCols.indexOf('lead_status') === -1) selCols.push('lead_status');
            if (selCols.indexOf('np_places')   === -1) selCols.push('np_places');
            var url = SUPABASE_URL + '/rest/v1/packages' +
                      '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                      '&pkg_id=eq.' + encodeURIComponent(pkgId) +
                      '&select=' + encodeURIComponent(selCols.join(','));
            fetch(url, {
                headers: {
                    apikey: SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + SUPABASE_ANON_KEY
                }
            }).then(function(r) { return r.json(); })
              .then(function(rows) {
                var row = (rows && rows[0]) || {};
                _inlSnapshot = row;

                // Заповнюємо поля + підсвічуємо ті, що вже мали значення
                activeCols.forEach(function(col) {
                    var el = document.getElementById('inl_col_' + col);
                    if (!el) return;
                    var v = row[col];
                    el.value = (v == null ? '' : String(v));
                    var parent = el.closest('.inl-row');
                    if (parent) {
                        var hasVal = (v != null && String(v).trim() !== '');
                        parent.classList.toggle('has-value', hasVal);
                    }
                });

                // Timeline розпаковок (якщо np_places > 1)
                _renderInlineTimeline(pkgId, row.np_places);

                document.getElementById('checkActionMenu').classList.remove('show');
                document.getElementById('inlOverlay').classList.add('open');
                setTimeout(function() {
                    var firstInput = document.querySelector('.inl-row input, .inl-row textarea, .inl-row select');
                    if (firstInput) firstInput.focus();
                }, 120);
            }).catch(function() {
                showToast({ variant: 'error', icon: '❌', label: 'Помилка',
                            value: ttn || '', status: 'Не вдалося завантажити дані' });
                setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2000);
            });
        }

        function closeInlineEditor() {
            document.getElementById('inlOverlay').classList.remove('open');
            _inlSnapshot = {};
            closeCheckActionMenu();
            resumeAfterSheet();
        }

        function saveInlineEditor() {
            var pkg = document.getElementById('inl_pkgId').value;
            if (!pkg || !TENANT_ID) return;

            var activeCols = getActiveFieldCols();
            var catalogMap = {};
            FIELD_CATALOG.forEach(function(f) { catalogMap[f.col] = f; });

            // Валідація обов'язкових (поки-що тільки recipient_phone, якщо активний)
            for (var i = 0; i < activeCols.length; i++) {
                var col = activeCols[i];
                var meta = catalogMap[col];
                if (!meta || !meta.required) continue;
                var el = document.getElementById('inl_col_' + col);
                if (!el) continue;
                var v = (el.value || '').trim();
                if (!v) {
                    el.focus();
                    showToast({ variant: 'error', icon: '❌', label: 'Обов’язкове поле',
                                value: '', status: meta.label });
                    setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2000);
                    return;
                }
            }

            // Диф проти snapshot — пишемо лише те, що змінилось
            var diff = {};
            activeCols.forEach(function(col) {
                var meta = catalogMap[col];
                if (!meta) return;
                var el = document.getElementById('inl_col_' + col);
                if (!el) return;
                var raw = (el.value == null ? '' : String(el.value)).trim();
                var oldRaw = _inlSnapshot[col] == null ? '' : String(_inlSnapshot[col]).trim();
                if (raw === oldRaw) return;
                if (raw === '') {
                    diff[col] = null;
                } else if (meta.type === 'int') {
                    var n = parseInt(raw, 10);
                    diff[col] = isNaN(n) ? null : n;
                } else if (meta.type === 'float') {
                    var nf = parseFloat(raw);
                    diff[col] = isNaN(nf) ? null : nf;
                } else {
                    diff[col] = raw;
                }
            });

            diff.scan_status = 'checked';

            // Якщо був «Невідомий» — знімаємо цей прапорець автоматично,
            // щоб лід не висів у «Невідомі» ТА «В перевірці» одночасно.
            // Зберігач ТТН зі сканера вже пройшов хоча б мінімальне
            // заповнення → переводимо в «Готова» (lead_status) + «В перевірці»
            // (через scan_status='checked').
            var wasUnknown = (_inlSnapshot && (_inlSnapshot.lead_status || '').toString()) === 'unknown';
            if (wasUnknown) {
                diff.lead_status = 'ready';
            }

            var btn = document.getElementById('inlSaveBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Збереження…';

            var url = SUPABASE_URL + '/rest/v1/packages' +
                      '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                      '&pkg_id=eq.' + encodeURIComponent(pkg);
            fetch(url, {
                method: 'PATCH',
                headers: {
                    apikey: SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                    'Content-Type': 'application/json',
                    Prefer: 'return=minimal'
                },
                body: JSON.stringify(diff)
            }).then(function(r) {
                btn.disabled = false;
                btn.textContent = '💾 Зберегти';
                if (!r.ok) {
                    return r.text().then(function(t) {
                        showToast({ variant: 'error', icon: '❌', label: 'Помилка збереження',
                                    value: pkg, status: t.slice(0, 80) });
                        setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2500);
                    });
                }
                showToast({ variant: 'success', icon: '✅', label: 'Збережено',
                            value: pkg, status: 'Лід → В перевірці' });
                setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 1800);
                closeInlineEditor();
            }).catch(function(err) {
                btn.disabled = false;
                btn.textContent = '💾 Зберегти';
                showToast({ variant: 'error', icon: '❌', label: 'Мережа',
                            value: pkg, status: String(err && err.message || err) });
                setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2500);
            });
        }

        // ==== FIELDS CHOOSER (C7/3) ============================================
        function openFieldsChooser() {
            renderFieldsChooser();
            document.getElementById('fcOverlay').classList.add('open');
        }

        function closeFieldsChooser() {
            document.getElementById('fcOverlay').classList.remove('open');
        }

        function renderFieldsChooser() {
            var body = document.getElementById('fcBody');
            body.innerHTML = '';
            var active = getActiveFieldCols();
            var activeSet = {};
            active.forEach(function(c) { activeSet[c] = true; });

            // Групуємо по category, зберігаючи порядок появи
            var groups = [];
            var byName = {};
            FIELD_CATALOG.forEach(function(f) {
                if (!byName[f.category]) {
                    byName[f.category] = { name: f.category, items: [] };
                    groups.push(byName[f.category]);
                }
                byName[f.category].items.push(f);
            });

            groups.forEach(function(g) {
                var cat = document.createElement('div');
                cat.className = 'fc-category';
                var h = document.createElement('div');
                h.className = 'fc-category-header';
                h.textContent = g.name;
                cat.appendChild(h);
                var items = document.createElement('div');
                items.className = 'fc-category-items';
                g.items.forEach(function(f) {
                    var item = document.createElement('label');
                    item.className = 'fc-item';
                    var cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.setAttribute('data-col', f.col);
                    cb.checked = !!activeSet[f.col];
                    if (f.required) { cb.checked = true; cb.disabled = true; }
                    item.appendChild(cb);
                    var label = document.createElement('div');
                    label.className = 'fc-item-label';
                    label.textContent = f.label;
                    item.appendChild(label);
                    if (f.required) {
                        var req = document.createElement('div');
                        req.className = 'fc-item-required';
                        req.textContent = 'обов.';
                        item.appendChild(req);
                    }
                    items.appendChild(item);
                });
                cat.appendChild(items);
                body.appendChild(cat);
            });
        }

        // ==== HISTORY OVERLAY (C7/4) ==========================================
        // Cross-session історія сканів поточного оператора з package_scan_log,
        // з'єднана з актуальним станом пакетів. Показує бейдж-статус (з якого
        // розділу CRM зараз доступний лід), фільтри-таби і кнопку актуалізації.
        var _hdFilter = 'all';
        var _hdItems  = [];     // [{ttn, pkg_id, scanned_at, filter, phone, badge}]
        var _hdLoading = false;

        function showHistoryButtonIfAny() {
            // Викликається періодично: показує кнопку 📋 якщо в БД є скани цього
            // оператора. Одноразовий COUNT-запит щоб не смикати дарма.
            if (!TENANT_ID || !USER_LOGIN) return;
            var url = SUPABASE_URL + '/rest/v1/package_scan_log' +
                      '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                      '&scanned_by=eq.' + encodeURIComponent(USER_LOGIN) +
                      '&select=id&limit=1';
            fetch(url, {
                headers: {
                    apikey: SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + SUPABASE_ANON_KEY
                }
            }).then(function(r) { return r.json(); })
              .then(function(rows) {
                if (rows && rows.length > 0) {
                    document.getElementById('historyDbBtn').style.display = '';
                }
              }).catch(function(){});
        }

        function openHistoryOverlay() {
            document.getElementById('hdOverlay').classList.add('open');
            refreshHistory();
        }

        function closeHistoryOverlay() {
            document.getElementById('hdOverlay').classList.remove('open');
        }

        function setHdFilter(f) {
            _hdFilter = f;
            Array.prototype.slice.call(document.querySelectorAll('.hd-tab'))
                 .forEach(function(t) {
                    t.classList.toggle('active', t.getAttribute('data-filter') === f);
                 });
            renderHistoryList();
        }

        function _classifyForHistory(log, pkg) {
            // Повертає { filter, badge }
            // Якщо pkg відсутній (cancelled лог) — «Відхилено на скані»
            if (!pkg) {
                return { filter: 'rejected', badge: { cls: 'rejected', text: 'Скасовано' } };
            }
            var lead = (pkg.lead_status || '').toString();
            var quality = (pkg.quality_check_required || '').toString();
            if (lead === 'unknown') return { filter: 'unknown', badge: { cls: 'unknown', text: 'Невідомий' } };
            if (lead === 'rejected' || quality === 'Відхилено') return { filter: 'rejected', badge: { cls: 'rejected', text: 'Відхилено' } };
            if (quality === 'Готова до маршруту') return { filter: 'ready', badge: { cls: 'ready', text: 'Готова' } };
            if (quality === 'В перевірці') return { filter: 'checking', badge: { cls: 'checking', text: 'В перевірці' } };
            return { filter: 'other', badge: { cls: 'other', text: quality || 'Інше' } };
        }

        function refreshHistory() {
            if (!TENANT_ID || !USER_LOGIN) return;
            if (_hdLoading) return;
            _hdLoading = true;
            var body = document.getElementById('hdBody');
            body.innerHTML = '<div class="hd-loading">⏳ Завантаження…</div>';

            // Крок 1: останні 200 записів логу цього оператора.
            // Виключаємо mode='cancelled' — у них немає pkg_id, тож у CRM
            // вони не видно, і у сканерській історії теж нема сенсу
            // показувати (клік не веде ні до чого, лише плутає).
            var logUrl = SUPABASE_URL + '/rest/v1/package_scan_log' +
                         '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                         '&scanned_by=eq.' + encodeURIComponent(USER_LOGIN) +
                         '&mode=neq.cancelled' +
                         '&order=scanned_at.desc&limit=200' +
                         '&select=id,pkg_id,ttn_number,scanned_at,mode,outcome,reject_reason';
            fetch(logUrl, {
                headers: {
                    apikey: SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + SUPABASE_ANON_KEY
                }
            }).then(function(r) { return r.json(); })
              .then(function(logs) {
                if (!Array.isArray(logs)) logs = [];

                // Ховаємо сирітки — старі 'cancelled' логи без pkg_id. Вони
                // лишились від попередньої поведінки (Скасувати писала тільки
                // в лог). Зараз Скасувати створює справжній «Відхилений» лід,
                // тож нові будуть коректно з'являтись і в CRM теж.
                logs = logs.filter(function(l) {
                    if (l.mode === 'cancelled' && !l.pkg_id) return false;
                    return true;
                });

                // Дедуп по ТТН: беремо найновіший запис
                var byTtn = {};
                logs.forEach(function(l) {
                    var ttn = l.ttn_number;
                    if (!ttn) return;
                    if (!byTtn[ttn] || l.scanned_at > byTtn[ttn].scanned_at) {
                        byTtn[ttn] = l;
                    }
                });
                var dedup = Object.keys(byTtn).map(function(t) { return byTtn[t]; });
                // Сортуємо по scanned_at desc
                dedup.sort(function(a, b) {
                    return (b.scanned_at || '').localeCompare(a.scanned_at || '');
                });

                // Крок 2: тягнемо поточний стан пакетів одним батчем
                var pkgIds = dedup.map(function(l) { return l.pkg_id; })
                                  .filter(function(p) { return !!p; });
                var uniquePkgIds = [];
                var seen = {};
                pkgIds.forEach(function(p) { if (!seen[p]) { seen[p] = true; uniquePkgIds.push(p); } });

                if (uniquePkgIds.length === 0) {
                    // Усі скасовані, пакетів немає
                    _finishHistoryRender(dedup, {});
                    return;
                }

                var inList = '(' + uniquePkgIds.map(function(p) {
                    return '"' + String(p).replace(/"/g, '\\"') + '"';
                }).join(',') + ')';
                var pkgUrl = SUPABASE_URL + '/rest/v1/packages' +
                             '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                             '&pkg_id=in.' + encodeURIComponent(inList) +
                             '&select=pkg_id,ttn_number,recipient_phone,lead_status,quality_check_required,scan_status,is_archived';
                fetch(pkgUrl, {
                    headers: {
                        apikey: SUPABASE_ANON_KEY,
                        Authorization: 'Bearer ' + SUPABASE_ANON_KEY
                    }
                }).then(function(r) { return r.json(); })
                  .then(function(pkgs) {
                    if (!Array.isArray(pkgs)) pkgs = [];
                    var byPkg = {};
                    pkgs.forEach(function(p) { byPkg[p.pkg_id] = p; });
                    _finishHistoryRender(dedup, byPkg);
                  }).catch(function() { _finishHistoryRender(dedup, {}); });
              }).catch(function() {
                _hdLoading = false;
                body.innerHTML = '<div class="hd-empty">Помилка завантаження</div>';
              });
        }

        function _finishHistoryRender(logs, byPkg) {
            _hdItems = logs.map(function(l) {
                var pkg = l.pkg_id ? byPkg[l.pkg_id] : null;
                // Якщо pkg архівовано — трактуємо як відсутній
                if (pkg && pkg.is_archived) pkg = null;
                var cls = _classifyForHistory(l, pkg);
                return {
                    ttn: l.ttn_number,
                    pkg_id: pkg ? pkg.pkg_id : null,
                    scanned_at: l.scanned_at,
                    mode: l.mode,
                    phone: pkg ? (pkg.recipient_phone || '') : '',
                    filter: cls.filter,
                    badge: cls.badge
                };
            });
            _hdLoading = false;
            _updateHistoryCounts();
            renderHistoryList();
        }

        function _updateHistoryCounts() {
            var counts = { all: _hdItems.length, unknown: 0, checking: 0, ready: 0, rejected: 0 };
            _hdItems.forEach(function(it) {
                if (counts[it.filter] != null) counts[it.filter]++;
            });
            document.getElementById('hdCountAll').textContent = counts.all;
            document.getElementById('hdCountUnknown').textContent = counts.unknown;
            document.getElementById('hdCountChecking').textContent = counts.checking;
            document.getElementById('hdCountReady').textContent = counts.ready;
            document.getElementById('hdCountRejected').textContent = counts.rejected;
        }

        function renderHistoryList() {
            var body = document.getElementById('hdBody');
            var items = _hdItems;
            if (_hdFilter !== 'all') {
                items = items.filter(function(it) { return it.filter === _hdFilter; });
            }
            if (items.length === 0) {
                body.innerHTML = '<div class="hd-empty">Поки порожньо у цій категорії</div>';
                return;
            }
            var html = items.map(function(it) {
                var time = '';
                if (it.scanned_at) {
                    var d = new Date(it.scanned_at);
                    if (!isNaN(d.getTime())) {
                        time = d.toLocaleString('uk-UA', { day: '2-digit', month: '2-digit',
                            year: '2-digit', hour: '2-digit', minute: '2-digit' });
                    }
                }
                var pkgAttr = it.pkg_id ? (' data-pkg="' + _escHtml(it.pkg_id) + '"') : '';
                return '<div class="hd-card"' + pkgAttr + ' data-ttn="' + _escHtml(it.ttn) + '" ' +
                       'onclick="hdCardClick(this)">' +
                       '<div class="hd-card-row">' +
                         '<div class="hd-card-ttn">' + _escHtml(it.ttn || '—') + '</div>' +
                         '<div class="hd-card-badge ' + it.badge.cls + '">' + _escHtml(it.badge.text) + '</div>' +
                       '</div>' +
                       (it.phone ? '<div class="hd-card-phone">📞 ' + _escHtml(it.phone) + '</div>' : '') +
                       '<div class="hd-card-meta">' + _escHtml(time) + (it.mode === 'cancelled' ? ' · скасовано на скані' : '') + '</div>' +
                       '</div>';
            }).join('');
            body.innerHTML = html;
        }

        function _escHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function hdCardClick(el) {
            var pkg = el.getAttribute('data-pkg');
            var ttn = el.getAttribute('data-ttn');
            if (!pkg) {
                // Скасований без pkg — редагувати нічого, просто показуємо тост
                showToast({ variant: 'warn', icon: '⚠️', label: 'Скасовано на скані',
                            value: ttn || '', status: 'Ліда немає — CRM → Перевірка → Відхилені' });
                setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2500);
                return;
            }
            closeHistoryOverlay();
            openInlineEditor(pkg, ttn);
        }

        function saveFieldsChooser() {
            var picks = [];
            Array.prototype.slice.call(document.querySelectorAll('#fcBody input[type=checkbox]'))
                 .forEach(function(cb) {
                    if (cb.checked) picks.push(cb.getAttribute('data-col'));
                 });
            if (picks.length === 0) {
                // Нічого не вибрано — скидаємо до дефолту, щоб оператор не лишився з порожньою формою
                resetFieldsToDefault();
                closeFieldsChooser();
                return;
            }
            setActiveFieldCols(picks);
            closeFieldsChooser();
            // Оновлюємо відкритий редактор (якщо він зараз видимий)
            var inlOpen = document.getElementById('inlOverlay').classList.contains('open');
            if (inlOpen) {
                var pkg = document.getElementById('inl_pkgId').value;
                var ttn = document.getElementById('inlTitleTtn').textContent;
                if (pkg) openInlineEditor(pkg, ttn);
            }
        }

        // ==== UNKNOWN-TTN SHEET =================================================
        // Показується поверх камери, коли скан створив нову посилку (scan_ttn →
        // type:'new') або коли peek_ttn відповів «не знайдено». Дії:
        //   📝 Заповнити      → редірект у CRM, відкриється fill-модалка
        //   💾 Зберегти       → нічого не робимо (лід уже в БД з scan_ttn),
        //                        просто закриваємо sheet і повертаємося до скану
        //   🔙 Сканувати далі → НЕ зберігати невідомого: якщо лід створено —
        //                        видаляємо його через /rest/v1/packages DELETE
        //                        (peek-режим нічого не створював — просто закриваємо)
        var _unknownSheetTtn = null;
        var _unknownSheetPkg = null;

        function showUnknownSheet(ttn, pkgId) {
            _unknownSheetTtn = ttn || '';
            _unknownSheetPkg = pkgId || null;
            document.getElementById('unknownSheetTtn').textContent = ttn || '—';
            document.getElementById('resultToast').classList.remove('show');
            document.getElementById('unknownSheet').classList.add('open');
        }

        function closeUnknownSheet() {
            document.getElementById('unknownSheet').classList.remove('open');
            _unknownSheetTtn = null;
            _unknownSheetPkg = null;
        }

        function resumeAfterSheet() {
            // Scanner is paused after each scan; resume so user can scan далі
            if (scanner && isScanning && isPaused) {
                scanner.resume();
                isPaused = false;
            }
            document.getElementById('mainBtn').style.display = 'none';
        }

        function unknownAction(action) {
            var ttn = _unknownSheetTtn;
            var pkg = _unknownSheetPkg;

            if (action === 'fill') {
                // CRM залишається «портом» для Заповнення — форма там
                var url = 'index.html?scan=' + encodeURIComponent(ttn) + '&unknown=1';
                if (pkg) url += '&pkg=' + encodeURIComponent(pkg);
                window.location.href = url;
                return;
            }

            if (action === 'save') {
                // Якщо pkg вже існує (scan-режим → scan_ttn створив Невідомого)
                // — нічого не треба, просто виходимо. У check-режимі (peek_ttn)
                // у БД НІЧОГО не створено — треба явно зареєструвати Невідомого
                // через scan_ttn, щоб він з'явився у CRM «Невідомі».
                if (pkg) {
                    closeUnknownSheet();
                    resumeAfterSheet();
                    return;
                }
                if (!TENANT_ID) { closeUnknownSheet(); resumeAfterSheet(); return; }
                sb.rpc('scan_ttn', {
                    p_tenant_id: TENANT_ID,
                    p_ttn: ttn,
                    p_direction: DEFAULT_DIRECTION,
                    p_user: USER_LOGIN
                }).then(function(result) {
                    var r = (result && result.data) || {};
                    if (r && r.pkg_id) {
                        lastScannedPkgId = r.pkg_id;
                        lastScannedTtn   = ttn;
                        // editBtn видалено; НП-оплата тепер у cam-actions
                    }
                    showToast({
                        variant: 'created', icon: '💾',
                        label: 'Збережено як Невідомий',
                        value: ttn, status: 'Доступний у CRM → Невідомі'
                    });
                    setTimeout(function(){
                        document.getElementById('resultToast').classList.remove('show');
                    }, 1800);
                }).catch(function(){}).finally(function() {
                    closeUnknownSheet();
                    resumeAfterSheet();
                });
                return;
            }

            if (action === 'next') {
                // Не зберігати: якщо є pkg_id від scan_ttn — видаляємо запис
                if (pkg && TENANT_ID) {
                    var delUrl = SUPABASE_URL + '/rest/v1/packages' +
                                 '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                                 '&pkg_id=eq.' + encodeURIComponent(pkg);
                    fetch(delUrl, {
                        method: 'DELETE',
                        headers: {
                            apikey: SUPABASE_ANON_KEY,
                            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                            Prefer: 'return=minimal'
                        }
                    }).catch(function(){}).finally(function() {
                        closeUnknownSheet();
                        resumeAfterSheet();
                    });
                } else {
                    closeUnknownSheet();
                    resumeAfterSheet();
                }
                return;
            }
        }

        // ==== BOX-COUNT MODAL ====
        // Opened only when scan_ttn returns type:'new' (package was just created).
        // Writes item_count back via REST PATCH (anon key; RLS disabled on this project).
        var boxModalPkg = null;
        function openBoxModal(ttn, pkg_id) {
            if (!pkg_id) return;
            boxModalPkg = pkg_id;
            document.getElementById('boxModalTtn').textContent = ttn;
            document.getElementById('boxOther').value = '';
            document.getElementById('boxModal').classList.add('show');
        }
        function closeBoxModal() {
            document.getElementById('boxModal').classList.remove('show');
            boxModalPkg = null;
        }
        function pickBoxCount(n) { saveBoxCount(n); }
        function pickBoxOther() {
            var v = parseInt(document.getElementById('boxOther').value, 10);
            if (!v || v < 1 || v > 999) return;
            saveBoxCount(v);
        }
        function saveBoxCount(n) {
            var pkg = boxModalPkg;
            if (!pkg || !TENANT_ID) { closeBoxModal(); return; }
            var url = SUPABASE_URL + '/rest/v1/packages' +
                      '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                      '&pkg_id=eq.' + encodeURIComponent(pkg);
            fetch(url, {
                method: 'PATCH',
                headers: {
                    apikey: SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                    'Content-Type': 'application/json',
                    Prefer: 'return=minimal'
                },
                body: JSON.stringify({ item_count: n })
            }).catch(function(){}).finally(function(){
                closeBoxModal();
            });
        }

        // ==== NP-PAYMENT MODAL ====
        // Opened via ✏️ НП-оплата button after any successful scan.
        // Calls register_np_payment RPC which atomically updates np_status,
        // np_amount, debt and logs to package_scan_log (mode='np_edit').
        var npPayer = null;   // 'client' | 'us'

        function openNpModal() {
            if (!lastScannedPkgId) return;
            document.getElementById('npModalTtn').textContent = lastScannedTtn || lastScannedPkgId;
            document.getElementById('npAmount').value = '';
            npPayer = null;
            refreshNpUI();
            document.getElementById('npModal').classList.add('show');
        }

        function closeNpModal() {
            document.getElementById('npModal').classList.remove('show');
            npPayer = null;
        }

        function setNpPayer(p) {
            if (p !== 'client' && p !== 'us') return;
            npPayer = p;
            refreshNpUI();
        }

        function refreshNpUI() {
            document.querySelectorAll('.np-payer-btn').forEach(function(b) {
                b.classList.toggle('active', b.getAttribute('data-payer') === npPayer);
            });
            document.getElementById('npAmountRow').classList.toggle('show', npPayer === 'us');
            var saveBtn = document.getElementById('npSaveBtn');
            // Client path is valid immediately; 'us' requires a positive amount.
            if (npPayer === 'client') {
                saveBtn.disabled = false;
            } else if (npPayer === 'us') {
                var v = parseFloat(document.getElementById('npAmount').value);
                saveBtn.disabled = !(v > 0);
            } else {
                saveBtn.disabled = true;
            }
        }

        // Amount input: enable/disable Save live.
        document.addEventListener('DOMContentLoaded', function() {
            var amt = document.getElementById('npAmount');
            if (amt) amt.addEventListener('input', refreshNpUI);
        });

        function saveNpPayment() {
            if (!lastScannedPkgId || !TENANT_ID || !npPayer) return;
            var amount = npPayer === 'us'
                ? parseFloat(document.getElementById('npAmount').value) : null;
            if (npPayer === 'us' && !(amount > 0)) return;

            var btn = document.getElementById('npSaveBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Збереження…';

            sb.rpc('register_np_payment', {
                p_tenant_id: TENANT_ID,
                p_pkg_id:    lastScannedPkgId,
                p_payer:     npPayer,
                p_amount:    amount,
                p_user:      USER_LOGIN
            }).then(function(result) {
                btn.textContent = '💾 Зберегти';
                if (result.error) {
                    showToast({ variant: 'error', icon: '❌', label: 'Помилка НП',
                                value: lastScannedTtn || '', status: result.error.message });
                    setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2500);
                    refreshNpUI();
                    return;
                }
                var r = result.data || {};
                if (!r.ok) {
                    showToast({ variant: 'error', icon: '❌', label: 'Помилка НП',
                                value: lastScannedTtn || '', status: r.error || 'Невідома помилка' });
                    setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2500);
                    refreshNpUI();
                    return;
                }
                var label = npPayer === 'client' ? '👤 НП: клієнт сам' : '🏢 НП: платимо ми';
                var status = npPayer === 'us'
                    ? ('+' + (r.np_amount || amount) + ' UAH → борг: ' + (r.debt || 0) + ' UAH')
                    : ('Борг не змінено: ' + (r.debt || 0) + ' UAH');
                showToast({ variant: 'success', icon: '✅', label: label,
                            value: lastScannedTtn || '', status: status });
                setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2800);
                closeNpModal();
            }).catch(function(err) {
                btn.textContent = '💾 Зберегти';
                showToast({ variant: 'error', icon: '❌', label: 'Мережа',
                            value: lastScannedTtn || '', status: String(err && err.message || err) });
                setTimeout(function(){ document.getElementById('resultToast').classList.remove('show'); }, 2500);
                refreshNpUI();
            });
        }

        function showToast(opts) {
            var t = document.getElementById('resultToast');
            t.className = 'result-toast';
            if (opts.variant) t.classList.add(opts.variant);
            document.getElementById('toastIcon').textContent = opts.icon || '✅';
            document.getElementById('toastLabel').textContent = opts.label || '';
            document.getElementById('toastValue').textContent = opts.value || '';
            document.getElementById('toastStatus').textContent = opts.status || '';
            t.classList.add('show');
        }

        function mainBtnClick() {
            if (!isScanning || !isPaused) return;
            scanner.resume();
            isPaused = false;
            document.getElementById('resultToast').classList.remove('show');
            document.getElementById('mainBtn').style.display = 'none';
            document.getElementById('checkActionMenu').classList.remove('show');
        }

        function stopScan() {
            if (!scanner || !isScanning) return;
            scanner.stop().then(function() {
                isScanning = false;
                isPaused = false;
                document.getElementById('scanFrame').style.display = 'none';
                document.getElementById('topbar').style.display = 'none';
                document.getElementById('bottombar').style.display = 'none';
                document.getElementById('modePill').classList.remove('show');
                document.getElementById('resultToast').classList.remove('show');
                // editBtn видалено
                lastScannedPkgId = null;
                lastScannedTtn   = null;
                closeNpModal();
                closeUnknownSheet();
                closeCheckActionMenu();
                document.getElementById('inlOverlay').classList.remove('open');
                document.getElementById('fcOverlay').classList.remove('open');
                document.getElementById('hdOverlay').classList.remove('open');
                document.getElementById('historyDbBtn').style.display = 'none';
                _sessionScans = {};
                document.getElementById('startScreen').classList.remove('hidden');
            }).catch(function() {});
        }

        function addToHistory(code, variant, status) {
            var time = new Date().toTimeString().substring(0, 8);
            scanHistory.unshift({ code: code, time: time, variant: variant || '', status: status || '' });
            if (scanHistory.length > 50) scanHistory.pop();
            renderHistory();
        }

        function variantDot(v) {
            var c = '#64748b';
            if (v === 'success') c = '#10b981';
            else if (v === 'warn') c = '#f59e0b';
            else if (v === 'created') c = '#8b5cf6';
            else if (v === 'error') c = '#ef4444';
            else if (v === 'already') c = '#64748b';
            return '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c+';margin-right:6px;flex-shrink:0;"></span>';
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, function(ch) {
                return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch];
            });
        }

        function renderHistory() {
            var list = document.getElementById('historyList');
            if (scanHistory.length === 0) {
                list.innerHTML = '<div class="history-empty">Поки порожньо</div>';
                return;
            }
            list.innerHTML = scanHistory.map(function(item) {
                return '<div class="history-item" style="flex-direction:column;align-items:stretch;">' +
                    '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">' +
                        '<span class="history-code">' + variantDot(item.variant) + escapeHtml(item.code) + '</span>' +
                        '<span class="history-time">' + item.time + '</span>' +
                    '</div>' +
                    (item.status ? '<div style="font-size:11px;color:rgba(255,255,255,0.55);margin-top:4px;">' + escapeHtml(item.status) + '</div>' : '') +
                '</div>';
            }).join('');
        }

        function clearHistory() {
            scanHistory = [];
            sessionCounter = 0;
            _sessionScans = {};
            document.getElementById('counterScanned').textContent = '📊 0';
            renderHistory();
        }

        function openHistory() {
            document.getElementById('historyDrawer').classList.add('open');
            document.getElementById('backdrop').classList.add('show');
        }

        function closeHistory() {
            document.getElementById('historyDrawer').classList.remove('open');
            document.getElementById('backdrop').classList.remove('show');
        }

        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isScanning) stopScan();
        });
    </script>
</body>
</html>
