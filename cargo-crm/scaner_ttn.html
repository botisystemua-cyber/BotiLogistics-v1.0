<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>Сканер ТТН</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            position: fixed;
            inset: 0;
        }

        /* ==== CAMERA FULLSCREEN ==== */
        #reader {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
            overflow: hidden;
        }
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
        #reader > div { border: none !important; }
        /* Прибираємо дефолтні обведення/рамки від html5-qrcode */
        #reader * { border-color: transparent !important; }

        /* ==== TOP BAR ==== */
        .topbar {
            position: absolute; top: 0; left: 0; right: 0;
            padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7), transparent);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar-title {
            font-size: 14px; font-weight: 700;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .topbar-btn {
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .topbar-counter {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .counter-pill {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }

        /* ==== SCAN FRAME OVERLAY ==== */
        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: min(85vw, 400px);
            height: 180px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
            z-index: 5;
            pointer-events: none;
        }
        .scan-frame::before,
        .scan-frame::after,
        .scan-frame > span::before,
        .scan-frame > span::after {
            content: '';
            position: absolute;
            width: 28px; height: 28px;
            border: 4px solid #10b981;
        }
        .scan-frame::before { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 14px; }
        .scan-frame::after { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 14px; }
        .scan-frame > span::before { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 14px; }
        .scan-frame > span::after { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 14px; }

        .scan-line {
            position: absolute;
            left: 10px; right: 10px;
            height: 2px;
            background: #10b981;
            box-shadow: 0 0 12px #10b981;
            top: 50%;
            animation: scan-line-move 2s ease-in-out infinite;
        }
        @keyframes scan-line-move {
            0%, 100% { top: 20%; }
            50% { top: 80%; }
        }

        .scan-hint {
            position: absolute;
            bottom: -40px; left: 0; right: 0;
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* ==== RESULT TOAST (showed briefly after scan) ==== */
        .result-toast {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 15;
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 28px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            min-width: 260px;
            max-width: 90vw;
        }
        .result-toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .result-toast.success  { background: rgba(16, 185, 129, 0.95); }   /* green */
        .result-toast.already  { background: rgba(100, 116, 139, 0.95); }  /* slate */
        .result-toast.warn     { background: rgba(245, 158, 11, 0.95); }   /* amber */
        .result-toast.created  { background: rgba(139, 92, 246, 0.95); }   /* violet */
        .result-toast.error    { background: rgba(239, 68, 68, 0.95); }    /* red */
        .result-toast-icon { font-size: 36px; margin-bottom: 6px; }
        .result-toast-label {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-toast-value {
            font-size: 22px;
            font-weight: 800;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            margin-top: 4px;
            word-break: break-all;
            line-height: 1.2;
        }

        /* ==== BOTTOM CONTROLS ==== */
        .bottombar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(env(safe-area-inset-bottom) + 20px);
            background: linear-gradient(0deg, rgba(0,0,0,0.85), transparent);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;   /* right-hand thumb reach */
            gap: 10px;
        }
        .bottombar .last-scan-bar,
        .bottombar .main-btn {
            width: 100%;
            max-width: 320px;        /* залишає ліву частину екрану вільною */
        }
        .last-scan-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 10px 14px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .last-scan-bar.show { display: flex; }
        .last-scan-icon { font-size: 20px; }
        .last-scan-info { flex: 1; min-width: 0; }
        .last-scan-label {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }
        .last-scan-code {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            font-family: "SF Mono", Monaco, monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .main-btn {
            width: 100%;
            padding: 18px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .main-btn:active { transform: scale(0.97); }
        .btn-start { background: #10b981; color: #fff; }
        .btn-next { background: #6366f1; color: #fff; }
        .btn-stop { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        /* ==== PRE-START SCREEN ==== */
        .start-screen {
            position: absolute; inset: 0;
            z-index: 20;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
        }
        .start-screen.hidden { display: none; }
        .start-logo { font-size: 72px; margin-bottom: 16px; }
        .start-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .start-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
            max-width: 320px;
            line-height: 1.5;
        }
        .start-btn {
            padding: 18px 48px;
            background: #10b981;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: inherit;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(16,185,129,0.4);
        }
        .start-btn:active { transform: scale(0.96); }
        .start-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

        .mode-btn {
            padding: 14px 8px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .mode-btn:disabled { cursor: not-allowed; }
        .mode-btn.active {
            background: rgba(16,185,129,0.25);
            border-color: #10b981;
            box-shadow: 0 4px 16px rgba(16,185,129,0.3);
        }
        .mode-btn:active:not(:disabled) { transform: scale(0.96); }

        /* Pre-scan mode/direction indicator pinned below topbar while scanning */
        .mode-pill {
            position: absolute;
            top: calc(env(safe-area-inset-top) + 60px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(16,185,129,0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(16,185,129,0.5);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            display: none;
        }
        .mode-pill.show { display: block; }

        /* ==== HISTORY DRAWER ==== */
        .history-drawer {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: min(85vw, 380px);
            background: #0f172a;
            z-index: 30;
            transform: translateX(100%);
            transition: transform 0.25s;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .history-drawer.open { transform: translateX(0); }
        .history-drawer-header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1e293b;
        }
        .history-drawer-title { font-size: 16px; font-weight: 700; }
        .history-drawer-close {
            width: 36px; height: 36px;
            background: #1e293b;
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }
        .history-item {
            padding: 12px 14px;
            background: #1e293b;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .history-code {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            word-break: break-all;
        }
        .history-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            flex-shrink: 0;
        }
        .history-empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
        }
        .history-clear-btn {
            margin: 12px 16px;
            padding: 12px;
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 10px;
            color: #fca5a5;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .backdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 25;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .backdrop.show { opacity: 1; pointer-events: all; }

        /* ==== BOX-COUNT MODAL (bottom-right, shown only on NEW package) ==== */
        .box-modal {
            position: absolute;
            right: 14px;
            bottom: calc(env(safe-area-inset-bottom) + 160px);
            z-index: 40;
            width: min(92vw, 280px);
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.55);
            border-radius: 16px;
            padding: 14px;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            display: none;
        }
        .box-modal.show { display: flex; }
        .box-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .box-modal-title {
            font-size: 12px;
            font-weight: 800;
            color: #c4b5fd;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .box-modal-close {
            width: 26px; height: 26px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }
        .box-modal-ttn {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            word-break: break-all;
        }
        .box-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .box-cell {
            aspect-ratio: 1;
            background: rgba(139, 92, 246, 0.18);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .box-cell:active { transform: scale(0.92); }
        .box-other {
            display: flex;
            gap: 6px;
        }
        .box-other input {
            flex: 1;
            padding: 8px 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            min-width: 0;
        }
        .box-other input::placeholder { color: rgba(255,255,255,0.35); }
        .box-other button {
            padding: 8px 14px;
            background: #8b5cf6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        /* ==== NP-PAYMENT MODAL (bottom-centered sheet) ==== */
        .np-modal {
            position: absolute;
            left: 50%;
            bottom: calc(env(safe-area-inset-bottom) + 20px);
            transform: translateX(-50%);
            z-index: 45;
            width: min(92vw, 360px);
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.55);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .np-modal.show { display: flex; }
        .np-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .np-modal-title {
            font-size: 13px;
            font-weight: 800;
            color: #a5b4fc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .np-modal-close {
            width: 28px; height: 28px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .np-modal-ttn {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            word-break: break-all;
        }
        .np-payer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .np-payer-btn {
            padding: 12px 8px;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }
        .np-payer-btn:active { transform: scale(0.96); }
        .np-payer-btn.active {
            background: rgba(99, 102, 241, 0.28);
            border-color: #6366f1;
            box-shadow: 0 4px 12px rgba(99,102,241,0.35);
        }
        .np-amount-row {
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .np-amount-row.show { display: flex; }
        .np-amount-row label {
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .np-amount-row input {
            padding: 12px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
        }
        .np-amount-row input::placeholder { color: rgba(255,255,255,0.35); }
        .np-save-btn {
            padding: 14px;
            background: #10b981;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
        .np-save-btn:active { transform: scale(0.97); }
        .np-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Edit button in bottombar — purple to match edit-style accents */
        .main-btn.btn-edit { background: #6366f1; color: #fff; display: none; }
        .main-btn.btn-edit.show { display: block; }

        /* ==== UNKNOWN-TTN SHEET (показується поверх камери для Невідомих) ==== */
        .unknown-sheet-backdrop {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 50;
            display: none;
            align-items: flex-end;
            justify-content: flex-end;        /* правий нижній кут */
            padding: 20px 14px calc(env(safe-area-inset-bottom) + 20px);
        }
        .unknown-sheet-backdrop.open { display: flex; animation: us-fade 0.2s ease-out; }
        @keyframes us-fade { from { opacity: 0; } to { opacity: 1; } }
        .unknown-sheet {
            width: 100%;
            max-width: 320px;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 16px 14px 14px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
            animation: us-slide 0.25s ease-out;
        }
        @keyframes us-slide { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .unknown-sheet-title {
            color: #fde68a;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .unknown-sheet-ttn {
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            margin: 4px 0 14px;
            word-break: break-all;
        }
        .unknown-sheet-btn {
            width: 100%;
            padding: 14px 16px;
            margin-top: 8px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.1s;
        }
        .unknown-sheet-btn:active { transform: scale(0.97); }
        .unknown-sheet-btn.fill { background: linear-gradient(180deg,#ef4444,#dc2626); color: #fff; box-shadow: 0 4px 10px rgba(220,38,38,0.35), 0 0 0 3px rgba(59,130,246,0.2); }
        .unknown-sheet-btn.save { background: #10b981; color: #fff; }
        .unknown-sheet-btn.next { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.18); }

        /* ==== CHECK ACTION MENU (C7/1): показується в режимі «Перевіряти» після скану ==== */
        .check-action-menu {
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 380px;
            margin-left: auto;    /* right-hand thumb reach */
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 12px;
            animation: us-slide 0.2s ease-out;
        }
        .check-action-menu.show { display: flex; }
        .cam-ttn-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cam-ttn-label {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .cam-ttn-code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            word-break: break-all;
            flex: 1;
        }
        .cam-ttn-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 999px;
            font-weight: 700;
            white-space: nowrap;
        }
        .cam-ttn-badge.found { background: #10b981; color: #fff; }
        .cam-ttn-badge.unknown { background: #f59e0b; color: #fff; }
        .cam-stepper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 6px;
        }
        .cam-stepper-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
        }
        .cam-stepper-btn:active { transform: scale(0.94); }
        .cam-stepper-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .cam-stepper-val {
            flex: 1;
            text-align: center;
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        .cam-stepper-label {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 600;
            padding-right: 8px;
        }
        .cam-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .cam-actions.with-fill { grid-template-columns: 1fr 1fr 1fr; }
        .cam-actions.cam-actions-4 { grid-template-columns: 1fr 1fr; gap: 6px; }
        .cam-btn {
            padding: 14px 10px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .cam-btn:active { transform: scale(0.97); }
        .cam-btn-cancel { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.18); }
        .cam-btn-primary { background: linear-gradient(180deg,#3b82f6,#2563eb); color: #fff; box-shadow: 0 4px 10px rgba(37,99,235,0.35); }
        .cam-btn-primary.save { background: linear-gradient(180deg,#10b981,#059669); box-shadow: 0 4px 10px rgba(16,185,129,0.35); }
        .cam-btn-fill { background: linear-gradient(180deg,#ef4444,#dc2626); color: #fff; box-shadow: 0 4px 10px rgba(220,38,38,0.35), 0 0 0 3px rgba(59,130,246,0.18); }
        .cam-btn-np { background: linear-gradient(180deg,#f59e0b,#d97706); color: #fff; box-shadow: 0 4px 10px rgba(217,119,6,0.35); }

        /* ==== INLINE EDITOR (C7/2): full-screen модалка прямо на сканері ==== */
        .inl-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.95);
            z-index: 80;
            display: none;
            flex-direction: column;
            padding: 0;
        }
        .inl-overlay.open { display: flex; animation: us-fade 0.15s ease-out; }
        .inl-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .inl-back-btn {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: none;
            width: 40px; height: 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
        .inl-title {
            flex: 1;
            min-width: 0;
        }
        .inl-title-label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .inl-title-ttn {
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            word-break: break-all;
        }
        .inl-fields-btn {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 12px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .inl-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .inl-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .inl-row label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .inl-row label .req { color: #f87171; margin-left: 2px; }
        .inl-row input,
        .inl-row select,
        .inl-row textarea {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            padding: 11px 12px;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }
        .inl-row input:focus,
        .inl-row select:focus,
        .inl-row textarea:focus {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.08);
        }
        /* Жовта підсвітка полів, які вже мали значення перед редагуванням */
        .inl-row.has-value input,
        .inl-row.has-value select,
        .inl-row.has-value textarea {
            border-color: #fbbf24;
            background: rgba(251,191,36,0.08);
        }
        .inl-row.has-value label::after {
            content: ' ✎';
            color: #fbbf24;
            font-size: 11px;
        }
        .inl-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .inl-footer {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 8px;
            padding: 12px 14px calc(env(safe-area-inset-bottom) + 12px);
            background: #0f172a;
            border-top: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .inl-btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .inl-btn:active { transform: scale(0.97); }
        .inl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .inl-btn-cancel { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.18); }
        .inl-btn-save { background: linear-gradient(180deg,#10b981,#059669); color: #fff; box-shadow: 0 4px 10px rgba(16,185,129,0.35); }

        /* Timeline розпаковок (коли np_places > 1) */
        .inl-timeline {
            background: rgba(251,191,36,0.08);
            border: 1px solid rgba(251,191,36,0.2);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .inl-timeline-title {
            color: #fbbf24;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .inl-timeline-item {
            color: rgba(255,255,255,0.85);
            font-size: 13px;
        }
        .inl-timeline-time {
            color: rgba(255,255,255,0.55);
            font-size: 11px;
            margin-left: 6px;
        }

        /* ==== FIELDS CHOOSER (C7/3) ==== */
        .fc-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.97);
            z-index: 90;
            display: none;
            flex-direction: column;
        }
        .fc-overlay.open { display: flex; animation: us-fade 0.15s ease-out; }
        .fc-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }
        .fc-category {
            margin-bottom: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            overflow: hidden;
        }
        .fc-category-header {
            padding: 10px 12px;
            color: #fbbf24;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.25);
        }
        .fc-category-items {
            display: flex;
            flex-direction: column;
        }
        .fc-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }
        .fc-item:hover { background: rgba(255,255,255,0.03); }
        .fc-item input[type=checkbox] {
            width: 20px; height: 20px;
            accent-color: #10b981;
            cursor: pointer;
        }
        .fc-item-label { flex: 1; }
        .fc-item-required {
            font-size: 10px;
            color: #f87171;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* ==== HISTORY OVERLAY (C7/4): cross-session історія сканів оператора ==== */
        .history-db-btn { background: rgba(16,185,129,0.2); color: #6ee7b7; }
        .hd-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.97);
            z-index: 85;
            display: none;
            flex-direction: column;
        }
        .hd-overlay.open { display: flex; animation: us-fade 0.15s ease-out; }
        .hd-tabs {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .hd-tab {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 7px 10px;
            border-radius: 20px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .hd-tab.active {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }
        .hd-tab-count {
            display: inline-block;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 0 6px;
            font-size: 10px;
            margin-left: 4px;
        }
        .hd-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .hd-actions {
            padding: 10px 12px calc(env(safe-area-inset-bottom) + 10px);
            background: #0f172a;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .hd-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.15s;
        }
        .hd-card:hover { border-color: rgba(255,255,255,0.2); }
        .hd-card:active { transform: scale(0.98); }
        .hd-card-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hd-card-ttn {
            flex: 1;
            color: #fff;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px;
            font-weight: 700;
            word-break: break-all;
        }
        .hd-card-badge {
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 999px;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .hd-card-badge.unknown { background: #f59e0b; color: #fff; }
        .hd-card-badge.checking { background: #3b82f6; color: #fff; }
        .hd-card-badge.ready { background: #10b981; color: #fff; }
        .hd-card-badge.rejected { background: #ef4444; color: #fff; }
        .hd-card-badge.other { background: rgba(255,255,255,0.15); color: #fff; }
        .hd-card-meta {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            margin-top: 4px;
        }
        .hd-card-phone {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            margin-top: 3px;
        }
        .hd-empty {
            color: rgba(255,255,255,0.4);
            text-align: center;
            padding: 40px 16px;
            font-size: 14px;
        }
        .hd-loading {
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- START SCREEN: лише «Перевіряти» (scan-режим прибрано) -->
    <div class="start-screen" id="startScreen">
        <div class="start-logo">📷</div>
        <div class="start-title">Сканер ТТН</div>
        <div class="start-subtitle">Режим «Перевіряти» · напрям Україна → Європа</div>

        <button class="start-btn" id="startCameraBtn" onclick="startScan()">▶ Увімкнути камеру</button>
        <button onclick="goBack()" style="margin-top:16px;padding:12px 32px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;">← Назад до CRM</button>
    </div>

    <!-- CAMERA -->
    <div id="reader"></div>

    <!-- MODE PILL (режим + напрям поверх камери) -->
    <div class="mode-pill" id="modePill">—</div>

    <!-- SCAN FRAME OVERLAY -->
    <div class="scan-frame" id="scanFrame" style="display:none;">
        <span></span>
        <div class="scan-line" id="scanLine"></div>
        <div class="scan-hint">Наведи на штрих-код</div>
    </div>

    <!-- TOP BAR -->
    <div class="topbar" id="topbar" style="display:none;">
        <div class="topbar-counter">
            <button class="topbar-btn" onclick="goBack()" title="Назад">←</button>
            <div class="counter-pill" id="counterScanned">📊 0</div>
            <!-- C7/4: «Історія» з БД (cross-session), з'являється коли є скани -->
            <button class="topbar-btn history-db-btn" id="historyDbBtn"
                    onclick="openHistoryOverlay()" title="Історія сканувань"
                    style="display:none;">📋</button>
        </div>
        <button class="topbar-btn" onclick="openHistory()" title="Історія сесії">≡</button>
    </div>

    <!-- RESULT TOAST -->
    <div class="result-toast" id="resultToast">
        <div class="result-toast-icon" id="toastIcon">✅</div>
        <div class="result-toast-label" id="toastLabel">Відскановано</div>
        <div class="result-toast-value" id="toastValue">—</div>
        <div class="result-toast-label" id="toastStatus" style="margin-top:6px;opacity:0.85;"></div>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div class="bottombar" id="bottombar" style="display:none;">
        <div class="last-scan-bar" id="lastScanBar">
            <div class="last-scan-icon">✅</div>
            <div class="last-scan-info">
                <div class="last-scan-label">Останній скан</div>
                <div class="last-scan-code" id="lastScanCode">—</div>
            </div>
        </div>

        <!-- Action menu для check-режиму: 4 кнопки 2×2 + stepper Місць НП -->
        <div class="check-action-menu" id="checkActionMenu">
            <div class="cam-ttn-row">
                <div class="cam-ttn-label">ТТН:</div>
                <div class="cam-ttn-code" id="camTtnCode">—</div>
                <div class="cam-ttn-badge" id="camTtnBadge">—</div>
            </div>
            <div class="cam-stepper">
                <button type="button" class="cam-stepper-btn" onclick="stepperChange(-1)">−</button>
                <div class="cam-stepper-val" id="camStepperVal">1</div>
                <button type="button" class="cam-stepper-btn" onclick="stepperChange(1)">+</button>
                <span class="cam-stepper-label">📥 Місць НП</span>
            </div>
            <div class="cam-actions cam-actions-4" id="camActions">
                <button type="button" class="cam-btn cam-btn-fill" onclick="checkActionFill()">📝 Заповнити</button>
                <button type="button" class="cam-btn cam-btn-primary" id="camBtnPrimary" onclick="checkActionPrimary()">💾 Зберегти</button>
                <button type="button" class="cam-btn cam-btn-np" onclick="openNpModal()">💰 НП-оплата</button>
                <button type="button" class="cam-btn cam-btn-cancel" onclick="checkActionCancel()">❌ Скасувати</button>
            </div>
        </div>

        <button class="main-btn btn-next" id="mainBtn" onclick="mainBtnClick()">🔄 Сканувати далі</button>
    </div>

    <!-- HISTORY DRAWER -->
    <div class="backdrop" id="backdrop" onclick="closeHistory()"></div>
    <div class="history-drawer" id="historyDrawer">
        <div class="history-drawer-header">
            <div class="history-drawer-title">📋 Історія сесії</div>
            <button class="history-drawer-close" onclick="closeHistory()">×</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty">Поки порожньо</div>
        </div>
        <button class="history-clear-btn" onclick="clearHistory()">🗑 Очистити історію</button>
    </div>

    <!-- NP-PAYMENT MODAL (bottom-centered, opened via ✏️ button) -->
    <div class="np-modal" id="npModal">
        <div class="np-modal-header">
            <div class="np-modal-title">🚚 Оплата Нової Пошти</div>
            <button class="np-modal-close" onclick="closeNpModal()" title="Закрити">×</button>
        </div>
        <div class="np-modal-ttn" id="npModalTtn">—</div>
        <div class="np-payer-grid">
            <button type="button" class="np-payer-btn" data-payer="client" onclick="setNpPayer('client')">👤 Клієнт сам</button>
            <button type="button" class="np-payer-btn" data-payer="us" onclick="setNpPayer('us')">🏢 Платимо ми</button>
        </div>
        <div class="np-amount-row" id="npAmountRow">
            <label>Сума, UAH (додасться у борг)</label>
            <input type="number" id="npAmount" min="1" max="999999" step="1" inputmode="numeric" placeholder="Напр. 180">
        </div>
        <button type="button" class="np-save-btn" id="npSaveBtn" onclick="saveNpPayment()" disabled>💾 Зберегти</button>
    </div>

    <!-- BOX-COUNT MODAL (bottom-right, only for newly created packages) -->
    <div class="box-modal" id="boxModal">
        <div class="box-modal-header">
            <div class="box-modal-title">📦 К-сть коробок</div>
            <button class="box-modal-close" onclick="closeBoxModal()" title="Закрити">×</button>
        </div>
        <div class="box-modal-ttn" id="boxModalTtn">—</div>
        <div class="box-grid">
            <button class="box-cell" onclick="pickBoxCount(1)">1</button>
            <button class="box-cell" onclick="pickBoxCount(2)">2</button>
            <button class="box-cell" onclick="pickBoxCount(3)">3</button>
            <button class="box-cell" onclick="pickBoxCount(4)">4</button>
            <button class="box-cell" onclick="pickBoxCount(5)">5</button>
            <button class="box-cell" onclick="pickBoxCount(6)">6</button>
            <button class="box-cell" onclick="pickBoxCount(7)">7</button>
            <button class="box-cell" onclick="pickBoxCount(8)">8</button>
            <button class="box-cell" onclick="pickBoxCount(9)">9</button>
            <button class="box-cell" onclick="pickBoxCount(10)">10</button>
        </div>
        <div class="box-other">
            <input type="number" id="boxOther" placeholder="Інше…" min="1" max="999" inputmode="numeric">
            <button onclick="pickBoxOther()">✓</button>
        </div>
    </div>

    <!-- INLINE EDITOR (C7/2): full-screen модалка редагування знайденого ТТН -->
    <div class="inl-overlay" id="inlOverlay">
        <div class="inl-header">
            <button type="button" class="inl-back-btn" onclick="closeInlineEditor()" title="Назад">←</button>
            <div class="inl-title">
                <div class="inl-title-label">ТТН</div>
                <div class="inl-title-ttn" id="inlTitleTtn">—</div>
            </div>
            <button type="button" class="inl-fields-btn" onclick="openFieldsChooser()" title="Налаштувати видимі поля">⚙️ Поля</button>
        </div>
        <div class="inl-body" id="inlBody">
            <input type="hidden" id="inl_pkgId">
            <!-- Поля рендеряться динамічно з FIELD_CATALOG через renderInlineFields() -->
        </div>
        <div class="inl-footer">
            <button type="button" class="inl-btn inl-btn-cancel" onclick="closeInlineEditor()">❌ Скасувати</button>
            <button type="button" class="inl-btn inl-btn-save" id="inlSaveBtn" onclick="saveInlineEditor()">💾 Зберегти</button>
        </div>
    </div>

    <!-- HISTORY OVERLAY (C7/4): усі скани оператора з package_scan_log + поточний стан -->
    <div class="hd-overlay" id="hdOverlay">
        <div class="inl-header">
            <button type="button" class="inl-back-btn" onclick="closeHistoryOverlay()" title="Назад">←</button>
            <div class="inl-title">
                <div class="inl-title-label">Історія</div>
                <div class="inl-title-ttn">Мої скани</div>
            </div>
        </div>
        <div class="hd-tabs" id="hdTabs">
            <button type="button" class="hd-tab active" data-filter="all" onclick="setHdFilter('all')">Всі <span class="hd-tab-count" id="hdCountAll">0</span></button>
            <button type="button" class="hd-tab" data-filter="unknown" onclick="setHdFilter('unknown')">🟡 Невідомі <span class="hd-tab-count" id="hdCountUnknown">0</span></button>

    <!-- FIELDS CHOOSER (C7/3): вибір полів для inline-редактора за категоріями -->
    <div class="fc-overlay" id="fcOverlay">

    <!-- UNKNOWN-TTN SHEET: показується одразу на сканері для Невідомих -->
    <div class="unknown-sheet-backdrop" id="unknownSheet" onclick="if(event.target===this)closeUnknownSheet()">
        <div class="unknown-sheet">

            <button type="button" class="unknown-sheet-btn next" onclick="unknownAction('next')">🔙 Сканувати далі</button>
        </div>

    <script>
        // ==== SUPABASE CONFIG ====
        var SUPABASE_URL = 'https://pgdhuezxkehpjlxoesoe.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZGh1ZXp4a2VocGpseG9lc29lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDcyNTYsImV4cCI6MjA4OTkyMzI1Nn0.qG8kFr2sTuat4vhQ7NikGaXIa57YAT21ABZ8Q8gkRXg';
        var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Session from shared localStorage (written by config-crm on login).
        // We need BOTH tenant_id (for row filters) and user_login (for audit).
        var SESSION = (function() {
            try {
                var raw = localStorage.getItem('boti_session');
                if (!raw) return null;
                return JSON.parse(raw);
            } catch(_) { return null; }
        })();
        var TENANT_ID = SESSION && SESSION.tenant_id ? SESSION.tenant_id : null;
        var USER_LOGIN = SESSION && SESSION.user_login ? SESSION.user_login : 'unknown';

        var scanner = null;
        var scanHistory = [];
        var isScanning = false;
        var isPaused = false;
        // Per-session tally; in-memory only (resets on reload by design).
        var sessionCounter = 0;
        // C7/5: лічильник сканів кожного ТТН у поточній сесії. Якщо оператор
        // сканує той самий ТТН вдруге у check-режимі — це друга коробка тієї
        // ж накладної: пишемо в лог mode='unpack' і авто +1 до item_count.
        var _sessionScans = {};

        // Last successfully-scanned/peeked package; gates the ✏️ НП-оплата
        // button. Reset when scanner stops.
        var lastScannedPkgId = null;
        var lastScannedTtn   = null;

        // Режим зафіксовано — тільки «Перевіряти» (peek_ttn + action-меню).
        // Скан-режим (scan_ttn state-machine) прибрано з UX; RPC лишається
        // у коді бо викликається внутрішньо для «Зберегти» невідомого ТТН.
        var SCAN_MODE = 'check';

        // Новий напрям завжди UA → EU (product decision).
        var DEFAULT_DIRECTION = 'UA_EU';

        function refreshSetupUI() {
            document.getElementById('startCameraBtn').disabled = false;
            // Pill поверх камери
            var pill = document.getElementById('modePill');
            if (pill) pill.textContent = '✓ Перевірка';
        }
        document.addEventListener('DOMContentLoaded', function() {
            refreshSetupUI();
            // Автопродовження: CRM повертає сюди з ?resume=1 після дії над
            // сканом — одразу стартуємо камеру без стартового екрану.
            try {
                var resume = new URLSearchParams(location.search).get('resume') === '1';
                if (resume) {
                    setTimeout(function() {
                        try { startScan(); } catch(_) {}
                    }, 120);
                }
            } catch(_) {}
        });

        function goBack() {
            if (isScanning) {
                scanner.stop().catch(function(){});
                isScanning = false;
            }
            // Prefer history.back() — the browser can restore index.html from
            // bfcache instantly, avoiding a full loadData() round-trip (≈2–3s
            // on mobile). Fall back to href if there's no history entry.
            if (window.history.length > 1 && document.referrer &&
                document.referrer.indexOf('index.html') !== -1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        function startScan() {
            if (isScanning) return;
            if (!scanner) scanner = new Html5Qrcode('reader');

            document.getElementById('startScreen').classList.add('hidden');

            var config = {
                fps: 15,
                qrbox: function(w, h) {
                    var size = Math.min(w, h) * 0.75;
                    return { width: Math.min(400, size), height: Math.min(180, size * 0.5) };
                },
                aspectRatio: 1.7778,
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.ITF
                ],
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            scanner.start(
                { facingMode: { exact: 'environment' } },
                config,
                onScanSuccess,
                function() {}
            ).then(function() {
                isScanning = true;
                isPaused = false;
                document.getElementById('scanFrame').style.display = 'block';
                document.getElementById('topbar').style.display = 'flex';
                document.getElementById('bottombar').style.display = 'flex';
                document.getElementById('mainBtn').style.display = 'none';
                // C7/4: якщо в оператора вже є скани — показуємо кнопку «📋»
                showHistoryButtonIfAny();
                document.getElementById('modePill').classList.add('show');
            }).catch(function(err) {
                scanner.start(
                    { facingMode: 'environment' },
                    config,
                    onScanSuccess,
                    function() {}
                ).then(function() {
                    isScanning = true;
                    isPaused = false;
                    document.getElementById('scanFrame').style.display = 'block';
                    document.getElementById('topbar').style.display = 'flex';
                    document.getElementById('bottombar').style.display = 'flex';
                    document.getElementById('mainBtn').style.display = 'none';
                }).catch(function(err2) {
                    document.getElementById('startScreen').classList.remove('hidden');
                    alert('Не вдалось увімкнути камеру: ' + (err2.message || err2));
                });
            });
        }

        function onScanSuccess(decodedText) {
            if (isPaused) return;
            isPaused = true;
            if (scanner) scanner.pause(true);
            if (navigator.vibrate) navigator.vibrate([60, 40, 60]);

            document.getElementById('lastScanCode').textContent = decodedText;
            document.getElementById('lastScanBar').classList.add('show');

            showToast({
                variant: '',
                icon: '⏳',
                label: 'Перевірка...',
                value: decodedText,
                status: ''
            });

            scanTTN(decodedText);
        }

        // Scanner is a thin client over two RPCs (see sql/2026-04-scanner-auto-mode.sql):
        //   scan_ttn(tenant, ttn, direction, user)  → auto state-machine, writes+logs
        //   peek_ttn(tenant, ttn)                   → read-only, no log
        // State machine, uniqueness, and audit happen inside Postgres in one tx.
        var STATUS_LABEL = {
            received: 'Прийнято',
            checked: 'Перевірено',
            awaiting_route: 'Чекає маршруту',
            loaded: 'Завантажено',
            in_transit: 'В дорозі',
            arrived: 'Прибула',
            delivered: 'Видана',
            rejected: 'Відхилено'
        };
        var PAYMENT_LABEL = {
            paid:     '💚 Оплачено',
            partial:  '🟡 Частково',
            pending:  '🔴 Не оплачено',
            overpaid: '🔵 Переплата'
        };

        function fmtMoney(n, cur) {
            if (n === null || n === undefined || n === '') return null;
            var v = Number(n);
            if (!isFinite(v)) return null;
            return v.toFixed(2) + (cur ? ' ' + cur : '');
        }
        function buildPaymentStatus(r) {
            var parts = [];
            var cur = r.payment_currency || '';
            var total = fmtMoney(r.total_amount, cur);
            if (total) parts.push('Сума: ' + total);
            var debt = fmtMoney(r.debt, cur);
            if (debt) parts.push('Борг: ' + debt);
            return parts.join(' · ');
        }

        function scanTTN(ttn) {
            if (!TENANT_ID) {
                handleScanResult(ttn, { ok: false, error: 'Сесія не знайдена. Увійдіть в CRM.' });
                return;
            }
            // Єдиний шлях: peek_ttn (read-only). Всі подальші дії —
            // через action-menu і inline-редактор на сканері.
            sb.rpc('peek_ttn', {
                p_tenant_id: TENANT_ID,
                p_ttn: ttn
            }).then(function(result) {
                if (result.error) {
                    handleScanResult(ttn, { ok: false, mode: 'check', error: result.error.message });
                    return;
                }
                var r = result.data || {};
                if (!r.ok) {
                    handleScanResult(ttn, { ok: false, mode: 'check', error: r.error || 'Невідома помилка' });
                    return;
                }
                handleScanResult(ttn, {
                    ok: true,
                    mode: 'check',
                    pkg_id: r.pkg_id,
                    item_count: r.item_count,
                    np_places: r.np_places,
                    scan_status: r.scan_status,
                    payment_status: r.payment_status,
                    payment_currency: r.payment_currency,
                    total_amount: r.total_amount,
                    deposit: r.deposit,
                    debt: r.debt
                });
            });
        }

        function handleScanResult(ttn, res) {
            var variant = 'error', icon = '❌', label = 'Помилка', statusTxt = '';

            if (res && res.ok) {
                if (res.mode === 'check') {
                    // Check mode: show ONLY payment status + amounts. No name,
                    // no route (per product spec — it's for payment reconciliation).
                    variant = 'already';
                    icon = '💰';
                    label = PAYMENT_LABEL[res.payment_status] ||
                            (res.payment_status ? '💰 ' + res.payment_status : '💰 Оплата');
                    statusTxt = buildPaymentStatus(res);
                } else if (res.type === 'found') {
                    // Auto-transitioned (received→checked, checked→delivered, …)
                    variant = 'success'; icon = '✅';
                    label = STATUS_LABEL[res.status] || 'Оновлено';
                    statusTxt = buildPaymentStatus(res);
                } else if (res.type === 'already') {
                    variant = 'already'; icon = 'ℹ️';
                    label = 'Вже: ' + (STATUS_LABEL[res.status] || res.status || '—');
                    statusTxt = buildPaymentStatus(res);
                } else if (res.type === 'new') {
                    variant = 'created'; icon = '🆕';
                    label = 'Нова посилка';
                    statusTxt = 'Прийнято';
                    // New package → редірект на CRM «Невідомі», де оператор
                    // обирає «Заповнити / Сканувати далі / Видалити / Зберегти».
                    // (box-count модалку перенесено в CRM — див. Cargo.js)
                } else if (res.type === 'rejected') {
                    variant = 'warn'; icon = '⚠️'; label = 'Відхилено';
                    statusTxt = 'Статус: Відхилено';
                } else {
                    variant = 'success'; icon = '✅'; label = 'OK';
                }
            } else {
                statusTxt = (res && res.error) || 'Невідома помилка';
            }

            addToHistory(ttn, variant, statusTxt);
            // mainBtn ховаємо — замість нього checkActionMenu (нижче)
            document.getElementById('mainBtn').style.display = 'none';
            // C7/4: після першого успішного скану — кнопка історії
            document.getElementById('historyDbBtn').style.display = '';
            sessionCounter += 1;
            document.getElementById('counterScanned').textContent = '📊 ' + sessionCounter;

            // Track last lead so ✏️ НП-оплата knows which pkg to edit.
            // Only for successful results with a pkg_id (skip rejected/errors).
            if (res && res.ok && res.pkg_id) {
                lastScannedPkgId = res.pkg_id;
                lastScannedTtn   = ttn;
                // editBtn видалено; НП-оплата тепер у cam-actions
            }

            showToast({ variant: variant, icon: icon, label: label, value: ttn, status: statusTxt });

            setTimeout(function() {
                document.getElementById('resultToast').classList.remove('show');
            }, 2500);

            // Перевіряти-only: показуємо action-menu прямо в bottombar.
            // Редірект у CRM не відбувається ні в якому випадку.
            if (res && res.ok && res.pkg_id) {
                // C7/5: дубль у сесії = друга коробка тієї ж накладної →
                // лог 'unpack' + авто +1 до np_places (кількість фізичних
                // коробок з тим же ТТН), без action-menu.
                var prev = _sessionScans[ttn] || 0;
                if (prev >= 1) {
                    handleDuplicateUnpack(ttn, res.pkg_id, res.np_places);
                    _sessionScans[ttn] = prev + 1;
                    return;
                }
                _sessionScans[ttn] = prev + 1;
                setTimeout(function() {
                    showCheckActionMenu({
                        ttn: ttn,
                        pkg_id: res.pkg_id,
                        count: Math.max(1, parseInt(res.np_places, 10) || 1),
                        isUnknown: false,
                        scanStatus: res.scan_status
                    });
                }, 600);
            } else if (res && !res.ok && typeof res.error === 'string' && /не знайдено/i.test(res.error)) {
                // Невідомий ТТН — меню Зберегти/Скасувати
                setTimeout(function() {
                    showCheckActionMenu({
                        ttn: ttn,
                        pkg_id: null,
                        count: 1,
                        isUnknown: true
                    });
                }, 600);
            }
        }

        // ==== DUPLICATE UNPACK (C7/5) ==========================================
        // Викликається коли в check-режимі той самий ТТН сканується вдруге+
        // у цій сесії. Трактуємо як другу/третю коробку тієї ж накладної:
        //   • INSERT у package_scan_log mode='unpack' з timestamp і pkg_id
        //   • PATCH packages.item_count = item_count + 1 (оптимістично)
        //   • Toast «Другий знайшовся (коробка #N)»
        //   • НЕ показуємо action-menu — одразу resume, щоб не гальмувати
        function handleDuplicateUnpack(ttn, pkgId, prevNpPlaces) {
            if (!TENANT_ID || !pkgId) return;
            var currentBox = (_sessionScans[ttn] || 0) + 1;

            // 1) лог (fire-and-forget) — окрема мітка часу кожної розпаковки
            fetch(SUPABASE_URL + '/rest/v1/package_scan_log', {
                method: 'POST',
                headers: {
                    apikey: SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                    'Content-Type': 'application/json',
                    Prefer: 'return=minimal'
                },
                body: JSON.stringify({
                    tenant_id: TENANT_ID,
                    pkg_id: pkgId,
                    ttn_number: ttn,
                    scanned_by: USER_LOGIN,
                    mode: 'unpack',
                    direction: DEFAULT_DIRECTION,
                    from_status: null,
                    to_status: 'unpack',
                    outcome: 'already'
                })
            }).catch(function(){});

            // 2) np_places += 1 (кількість фізичних коробок з цим ТТН)
            var nextCount = Math.max(currentBox, (parseInt(prevNpPlaces, 10) || 0) + 1);
            fetch(SUPABASE_URL + '/rest/v1/packages' +
                  '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                  '&pkg_id=eq.' + encodeURIComponent(pkgId), {
                method: 'PATCH',
                headers: {
                    apikey: SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                    'Content-Type': 'application/json',
                    Prefer: 'return=minimal'
                },
                body: JSON.stringify({ np_places: nextCount })
            }).catch(function(){});

            // 3) toast + авто-resume
            showToast({
                variant: 'success',
                icon: '🎯',
                label: 'Другий знайшовся!',
                value: ttn,
                status: 'Коробка #' + currentBox + ' · Місць НП: ' + nextCount
            });
            setTimeout(function() {
                document.getElementById('resultToast').classList.remove('show');
                resumeAfterSheet();
            }, 1600);
        }

        // ==== CHECK ACTION MENU (C7/1) =========================================
        // Показується в режимі «Перевіряти» після успішного скану (знайдений
        // або невідомий ТТН). Містить stepper кількості + 2 кнопки дії.
        var _camState = { ttn: '', pkg_id: null, count: 1, isUnknown: false };

        function showCheckActionMenu(cfg) {
            _camState.ttn        = cfg.ttn || '';
            _camState.pkg_id     = cfg.pkg_id || null;
            _camState.count      = Math.max(1, parseInt(cfg.count, 10) || 1);
            _camState.isUnknown  = !!cfg.isUnknown;
            // scanStatus з peek_ttn: 'received' (щойно створений, не в перевірці),
            // 'checked' (вже в перевірці), 'awaiting_route', 'delivered' тощо
            _camState.scanStatus = cfg.scanStatus || null;

            document.getElementById('camTtnCode').textContent = _camState.ttn || '—';
            var badge = document.getElementById('camTtnBadge');
            if (_camState.isUnknown) {
                badge.textContent = '📡 Невідомий';
                badge.className = 'cam-ttn-badge unknown';
            } else if (_camState.scanStatus === 'checked') {
                badge.textContent = '🔍 В перевірці';
                badge.className = 'cam-ttn-badge found';
            } else {
                badge.textContent = '✓ Знайдено';
                badge.className = 'cam-ttn-badge found';
            }
            document.getElementById('camStepperVal').textContent = _camState.count;

            // Primary button міняємо залежно від стану:
            //   unknown            → «💾 Зберегти» (створює як Невідомого)
            //   known, not-checked → «🔍 В перевірку» (pkg іде у В перевірці)
            //   known, checked     → «✏️ Редагувати»
            var primary = document.getElementById('camBtnPrimary');
            primary.classList.remove('save');
            if (_camState.isUnknown) {
                primary.textContent = '💾 Зберегти';
                primary.classList.add('save');
            } else if (_camState.scanStatus === 'checked') {
                primary.textContent = '✏️ Редагувати';
            } else {
                primary.textContent = '🔍 В перевірку';
                primary.classList.add('save');
            }

            // Щоб НП-оплата з cam-actions мала куди писати
            if (_camState.pkg_id) {
                lastScannedPkgId = _camState.pkg_id;
                lastScannedTtn   = _camState.ttn;
            }

            // Ховаємо mainBtn — меню саме вирішує, що далі
            document.getElementById('mainBtn').style.display = 'none';
            document.getElementById('checkActionMenu').classList.add('show');
        }

        function closeCheckActionMenu() {
            document.getElementById('checkActionMenu').classList.remove('show');
            _camState = { ttn: '', pkg_id: null, count: 1, isUnknown: false };
        }

        function stepperChange(delta) {
            var next = Math.max(1, Math.min(999, _camState.count + (delta | 0)));
            if (next === _camState.count) return;
            _camState.count = next;
            document.getElementById('camStepperVal').textContent = next;

            // Stepper керує np_places — кількістю фізичних коробок з тим же ТТН
            // (item_count = скільки речей всередині, цим керує оператор у
            // редакторі; змішувати ці два поля не треба).
            if (_camState.pkg_id && TENANT_ID) {
                var url = SUPABASE_URL + '/rest/v1/packages' +
                          '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                          '&pkg_id=eq.' + encodeURIComponent(_camState.pkg_id);
                fetch(url, {
                    method: 'PATCH',
                    headers: {
                        apikey: SUPABASE_ANON_KEY,
                        Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                        'Content-Type': 'application/json',
                        Prefer: 'return=minimal'
                    },
                    body: JSON.stringify({ np_places: next })
                }).catch(function(){});
            }
        }

        function checkActionCancel() {
            var ttn = _camState.ttn;
            var isUnknown = _camState.isUnknown;

            if (isUnknown && TENANT_ID) {
                // Невідомий + Скасувати: створюємо лід одразу як «Відхилено»,
                // щоб він з'являвся і в CRM «Перевірка → Відхилені», і у
                // сканерській історії (там була плутанина — лог-записи без
                // pkg_id висіли у сканері, а в CRM їх не було).
                sb.rpc('scan_ttn', {
                    p_tenant_id: TENANT_ID, p_ttn: ttn,

                }).then(function(result) {

                        closeCheckActionMenu();
                        resumeAfterSheet();

                    // Ставимо статус «Відхилено» і знімаємо «Невідомий»
                    fetch(SUPABASE_URL + '/rest/v1/packages' +
