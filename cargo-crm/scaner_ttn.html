<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>Сканер ТТН</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            position: fixed;
            inset: 0;
        }

        /* ==== CAMERA FULLSCREEN ==== */
        #reader {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
            overflow: hidden;
        }
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
        #reader > div { border: none !important; }
        /* Прибираємо дефолтні обведення/рамки від html5-qrcode */
        #reader * { border-color: transparent !important; }

        /* ==== TOP BAR ==== */
        .topbar {
            position: absolute; top: 0; left: 0; right: 0;
            padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7), transparent);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar-title {
            font-size: 14px; font-weight: 700;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .topbar-btn {
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .topbar-counter {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .counter-pill {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }

        /* ==== SCAN FRAME OVERLAY ==== */
        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: min(85vw, 400px);
            height: 180px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
            z-index: 5;
            pointer-events: none;
        }
        .scan-frame::before,
        .scan-frame::after,
        .scan-frame > span::before,
        .scan-frame > span::after {
            content: '';
            position: absolute;
            width: 28px; height: 28px;
            border: 4px solid #10b981;
        }
        .scan-frame::before { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 14px; }
        .scan-frame::after { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 14px; }
        .scan-frame > span::before { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 14px; }
        .scan-frame > span::after { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 14px; }

        .scan-line {
            position: absolute;
            left: 10px; right: 10px;
            height: 2px;
            background: #10b981;
            box-shadow: 0 0 12px #10b981;
            top: 50%;
            animation: scan-line-move 2s ease-in-out infinite;
        }
        @keyframes scan-line-move {
            0%, 100% { top: 20%; }
            50% { top: 80%; }
        }

        .scan-hint {
            position: absolute;
            bottom: -40px; left: 0; right: 0;
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* ==== RESULT TOAST (showed briefly after scan) ==== */
        .result-toast {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 15;
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 28px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            min-width: 260px;
            max-width: 90vw;
        }
        .result-toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .result-toast.success  { background: rgba(16, 185, 129, 0.95); }   /* green */
        .result-toast.already  { background: rgba(100, 116, 139, 0.95); }  /* slate */
        .result-toast.warn     { background: rgba(245, 158, 11, 0.95); }   /* amber */
        .result-toast.created  { background: rgba(139, 92, 246, 0.95); }   /* violet */
        .result-toast.error    { background: rgba(239, 68, 68, 0.95); }    /* red */
        .result-toast-icon { font-size: 36px; margin-bottom: 6px; }
        .result-toast-label {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-toast-value {
            font-size: 22px;
            font-weight: 800;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            margin-top: 4px;
            word-break: break-all;
            line-height: 1.2;
        }

        /* ==== BOTTOM CONTROLS ==== */
        .bottombar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(env(safe-area-inset-bottom) + 20px);
            background: linear-gradient(0deg, rgba(0,0,0,0.85), transparent);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .last-scan-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 10px 14px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .last-scan-bar.show { display: flex; }
        .last-scan-icon { font-size: 20px; }
        .last-scan-info { flex: 1; min-width: 0; }
        .last-scan-label {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }
        .last-scan-code {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            font-family: "SF Mono", Monaco, monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .main-btn {
            width: 100%;
            padding: 18px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .main-btn:active { transform: scale(0.97); }
        .btn-start { background: #10b981; color: #fff; }
        .btn-next { background: #6366f1; color: #fff; }
        .btn-stop { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        /* ==== PRE-START SCREEN ==== */
        .start-screen {
            position: absolute; inset: 0;
            z-index: 20;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
        }
        .start-screen.hidden { display: none; }
        .start-logo { font-size: 72px; margin-bottom: 16px; }
        .start-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .start-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
            max-width: 320px;
            line-height: 1.5;
        }
        .start-btn {
            padding: 18px 48px;
            background: #10b981;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: inherit;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(16,185,129,0.4);
        }
        .start-btn:active { transform: scale(0.96); }
        .start-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

        .mode-btn {
            padding: 14px 8px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .mode-btn:disabled { cursor: not-allowed; }
        .mode-btn.active {
            background: rgba(16,185,129,0.25);
            border-color: #10b981;
            box-shadow: 0 4px 16px rgba(16,185,129,0.3);
        }
        .mode-btn:active:not(:disabled) { transform: scale(0.96); }

        /* Pre-scan mode/direction indicator pinned below topbar while scanning */
        .mode-pill {
            position: absolute;
            top: calc(env(safe-area-inset-top) + 60px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(16,185,129,0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(16,185,129,0.5);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            display: none;
        }
        .mode-pill.show { display: block; }

        /* ==== HISTORY DRAWER ==== */
        .history-drawer {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: min(85vw, 380px);
            background: #0f172a;
            z-index: 30;
            transform: translateX(100%);
            transition: transform 0.25s;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .history-drawer.open { transform: translateX(0); }
        .history-drawer-header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1e293b;
        }
        .history-drawer-title { font-size: 16px; font-weight: 700; }
        .history-drawer-close {
            width: 36px; height: 36px;
            background: #1e293b;
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }
        .history-item {
            padding: 12px 14px;
            background: #1e293b;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .history-code {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            word-break: break-all;
        }
        .history-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            flex-shrink: 0;
        }
        .history-empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
        }
        .history-clear-btn {
            margin: 12px 16px;
            padding: 12px;
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 10px;
            color: #fca5a5;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .backdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 25;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .backdrop.show { opacity: 1; pointer-events: all; }

        /* ==== BOX-COUNT MODAL (bottom-right, shown only on NEW package) ==== */
        .box-modal {
            position: absolute;
            right: 14px;
            bottom: calc(env(safe-area-inset-bottom) + 160px);
            z-index: 40;
            width: min(92vw, 280px);
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.55);
            border-radius: 16px;
            padding: 14px;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            display: none;
        }
        .box-modal.show { display: flex; }
        .box-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .box-modal-title {
            font-size: 12px;
            font-weight: 800;
            color: #c4b5fd;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .box-modal-close {
            width: 26px; height: 26px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }
        .box-modal-ttn {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            word-break: break-all;
        }
        .box-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .box-cell {
            aspect-ratio: 1;
            background: rgba(139, 92, 246, 0.18);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .box-cell:active { transform: scale(0.92); }
        .box-other {
            display: flex;
            gap: 6px;
        }
        .box-other input {
            flex: 1;
            padding: 8px 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            min-width: 0;
        }
        .box-other input::placeholder { color: rgba(255,255,255,0.35); }
        .box-other button {
            padding: 8px 14px;
            background: #8b5cf6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- START SCREEN: mode + direction setup, then camera -->
    <div class="start-screen" id="startScreen">
        <div class="start-logo">📷</div>
        <div class="start-title">Сканер ТТН</div>
        <div class="start-subtitle">Оберіть режим і напрям, потім запустіть камеру</div>

        <!-- MODE picker -->
        <div style="width:100%;max-width:360px;margin-bottom:18px;">
            <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;text-align:left;">Режим</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <button class="mode-btn" data-mode="scan" onclick="setMode('scan')">
                    <div style="font-size:22px;">🔍</div>
                    <div style="font-size:12px;font-weight:700;margin-top:2px;">Сканувати</div>
                </button>
                <button class="mode-btn" data-mode="check" onclick="setMode('check')">
                    <div style="font-size:22px;">✓</div>
                    <div style="font-size:12px;font-weight:700;margin-top:2px;">Перевіряти</div>
                </button>
            </div>
        </div>

        <!-- Напрям видалено — нові пакети завжди UA_EU (Україна-ЄВ). -->

        <button class="start-btn" id="startCameraBtn" onclick="startScan()" disabled>▶ Увімкнути камеру</button>
        <button onclick="goBack()" style="margin-top:16px;padding:12px 32px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;">← Назад до CRM</button>
    </div>

    <!-- CAMERA -->
    <div id="reader"></div>

    <!-- MODE PILL (режим + напрям поверх камери) -->
    <div class="mode-pill" id="modePill">—</div>

    <!-- SCAN FRAME OVERLAY -->
    <div class="scan-frame" id="scanFrame" style="display:none;">
        <span></span>
        <div class="scan-line" id="scanLine"></div>
        <div class="scan-hint">Наведи на штрих-код</div>
    </div>

    <!-- TOP BAR -->
    <div class="topbar" id="topbar" style="display:none;">
        <div class="topbar-counter">
            <button class="topbar-btn" onclick="goBack()" title="Назад">←</button>
            <div class="counter-pill" id="counterScanned">📊 0</div>
        </div>
        <button class="topbar-btn" onclick="openHistory()">≡</button>
    </div>

    <!-- RESULT TOAST -->
    <div class="result-toast" id="resultToast">
        <div class="result-toast-icon" id="toastIcon">✅</div>
        <div class="result-toast-label" id="toastLabel">Відскановано</div>
        <div class="result-toast-value" id="toastValue">—</div>
        <div class="result-toast-label" id="toastStatus" style="margin-top:6px;opacity:0.85;"></div>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div class="bottombar" id="bottombar" style="display:none;">
        <div class="last-scan-bar" id="lastScanBar">
            <div class="last-scan-icon">✅</div>
            <div class="last-scan-info">
                <div class="last-scan-label">Останній скан</div>
                <div class="last-scan-code" id="lastScanCode">—</div>
            </div>
        </div>
        <button class="main-btn btn-next" id="mainBtn" onclick="mainBtnClick()">🔄 Сканувати далі</button>
        <button class="main-btn btn-stop" onclick="stopScan()">✕ Завершити</button>
    </div>

    <!-- HISTORY DRAWER -->
    <div class="backdrop" id="backdrop" onclick="closeHistory()"></div>
    <div class="history-drawer" id="historyDrawer">
        <div class="history-drawer-header">
            <div class="history-drawer-title">📋 Історія сесії</div>
            <button class="history-drawer-close" onclick="closeHistory()">×</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty">Поки порожньо</div>
        </div>
        <button class="history-clear-btn" onclick="clearHistory()">🗑 Очистити історію</button>
    </div>

    <!-- BOX-COUNT MODAL (bottom-right, only for newly created packages) -->
    <div class="box-modal" id="boxModal">
        <div class="box-modal-header">
            <div class="box-modal-title">📦 К-сть коробок</div>
            <button class="box-modal-close" onclick="closeBoxModal()" title="Закрити">×</button>
        </div>
        <div class="box-modal-ttn" id="boxModalTtn">—</div>
        <div class="box-grid">
            <button class="box-cell" onclick="pickBoxCount(1)">1</button>
            <button class="box-cell" onclick="pickBoxCount(2)">2</button>
            <button class="box-cell" onclick="pickBoxCount(3)">3</button>
            <button class="box-cell" onclick="pickBoxCount(4)">4</button>
            <button class="box-cell" onclick="pickBoxCount(5)">5</button>
            <button class="box-cell" onclick="pickBoxCount(6)">6</button>
            <button class="box-cell" onclick="pickBoxCount(7)">7</button>
            <button class="box-cell" onclick="pickBoxCount(8)">8</button>
            <button class="box-cell" onclick="pickBoxCount(9)">9</button>
            <button class="box-cell" onclick="pickBoxCount(10)">10</button>
        </div>
        <div class="box-other">
            <input type="number" id="boxOther" placeholder="Інше…" min="1" max="999" inputmode="numeric">
            <button onclick="pickBoxOther()">✓</button>
        </div>
    </div>

    <script>
        // ==== SUPABASE CONFIG ====
        var SUPABASE_URL = 'https://pgdhuezxkehpjlxoesoe.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZGh1ZXp4a2VocGpseG9lc29lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDcyNTYsImV4cCI6MjA4OTkyMzI1Nn0.qG8kFr2sTuat4vhQ7NikGaXIa57YAT21ABZ8Q8gkRXg';
        var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Session from shared localStorage (written by config-crm on login).
        // We need BOTH tenant_id (for row filters) and user_login (for audit).
        var SESSION = (function() {
            try {
                var raw = localStorage.getItem('boti_session');
                if (!raw) return null;
                return JSON.parse(raw);
            } catch(_) { return null; }
        })();
        var TENANT_ID = SESSION && SESSION.tenant_id ? SESSION.tenant_id : null;
        var USER_LOGIN = SESSION && SESSION.user_login ? SESSION.user_login : 'unknown';

        var scanner = null;
        var scanHistory = [];
        var isScanning = false;
        var isPaused = false;
        // Per-session tally; in-memory only (resets on reload by design).
        var sessionCounter = 0;

        // Pre-scan setup state.
        //   'scan'  → mutates DB via scan_ttn RPC (new packages default to UA→EU)
        //   'check' → read-only peek_ttn
        var SCAN_MODE = null;

        // New packages always land as UA→EU; product decision (EU→UA parcels
        // aren't handled at the scan-in stage). Kept as a constant so if we
        // ever reintroduce the picker, it's one line to wire back.
        var DEFAULT_DIRECTION = 'UA_EU';

        // Restore last-used mode from localStorage (user preference, not
        // session data) so returning users don't re-pick every session.
        (function restoreSetup() {
            try {
                var lastMode = localStorage.getItem('scanner_last_mode');
                if (lastMode === 'scan' || lastMode === 'check') SCAN_MODE = lastMode;
            } catch(_) {}
        })();

        function setMode(m) {
            if (m !== 'scan' && m !== 'check') return;
            SCAN_MODE = m;
            try { localStorage.setItem('scanner_last_mode', m); } catch(_) {}
            refreshSetupUI();
        }
        function refreshSetupUI() {
            document.querySelectorAll('.mode-btn').forEach(function(b) {
                b.classList.toggle('active', b.getAttribute('data-mode') === SCAN_MODE);
            });

            document.getElementById('startCameraBtn').disabled = !SCAN_MODE;

            // Pill shown over camera
            var pill = document.getElementById('modePill');
            pill.textContent = SCAN_MODE === 'scan'  ? '🔍 Сканую'
                             : SCAN_MODE === 'check' ? '✓ Перевірка' : '—';
        }
        document.addEventListener('DOMContentLoaded', refreshSetupUI);

        function goBack() {
            if (isScanning) {
                scanner.stop().catch(function(){});
                isScanning = false;
            }
            // Prefer history.back() — the browser can restore index.html from
            // bfcache instantly, avoiding a full loadData() round-trip (≈2–3s
            // on mobile). Fall back to href if there's no history entry.
            if (window.history.length > 1 && document.referrer &&
                document.referrer.indexOf('index.html') !== -1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        function startScan() {
            if (isScanning) return;
            if (!scanner) scanner = new Html5Qrcode('reader');

            document.getElementById('startScreen').classList.add('hidden');

            var config = {
                fps: 15,
                qrbox: function(w, h) {
                    var size = Math.min(w, h) * 0.75;
                    return { width: Math.min(400, size), height: Math.min(180, size * 0.5) };
                },
                aspectRatio: 1.7778,
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.ITF
                ],
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            scanner.start(
                { facingMode: { exact: 'environment' } },
                config,
                onScanSuccess,
                function() {}
            ).then(function() {
                isScanning = true;
                isPaused = false;
                document.getElementById('scanFrame').style.display = 'block';
                document.getElementById('topbar').style.display = 'flex';
                document.getElementById('bottombar').style.display = 'flex';
                document.getElementById('mainBtn').style.display = 'none';
                document.getElementById('modePill').classList.add('show');
            }).catch(function(err) {
                scanner.start(
                    { facingMode: 'environment' },
                    config,
                    onScanSuccess,
                    function() {}
                ).then(function() {
                    isScanning = true;
                    isPaused = false;
                    document.getElementById('scanFrame').style.display = 'block';
                    document.getElementById('topbar').style.display = 'flex';
                    document.getElementById('bottombar').style.display = 'flex';
                    document.getElementById('mainBtn').style.display = 'none';
                }).catch(function(err2) {
                    document.getElementById('startScreen').classList.remove('hidden');
                    alert('Не вдалось увімкнути камеру: ' + (err2.message || err2));
                });
            });
        }

        function onScanSuccess(decodedText) {
            if (isPaused) return;
            isPaused = true;
            if (scanner) scanner.pause(true);
            if (navigator.vibrate) navigator.vibrate([60, 40, 60]);

            document.getElementById('lastScanCode').textContent = decodedText;
            document.getElementById('lastScanBar').classList.add('show');

            showToast({
                variant: '',
                icon: '⏳',
                label: 'Перевірка...',
                value: decodedText,
                status: ''
            });

            scanTTN(decodedText);
        }

        // Scanner is a thin client over two RPCs (see sql/2026-04-scanner-auto-mode.sql):
        //   scan_ttn(tenant, ttn, direction, user)  → auto state-machine, writes+logs
        //   peek_ttn(tenant, ttn)                   → read-only, no log
        // State machine, uniqueness, and audit happen inside Postgres in one tx.
        var STATUS_LABEL = {
            received: 'Прийнято',
            checked: 'Перевірено',
            awaiting_route: 'Чекає маршруту',
            loaded: 'Завантажено',
            in_transit: 'В дорозі',
            arrived: 'Прибула',
            delivered: 'Видана',
            rejected: 'Відхилено'
        };
        var PAYMENT_LABEL = {
            paid:     '💚 Оплачено',
            partial:  '🟡 Частково',
            pending:  '🔴 Не оплачено',
            overpaid: '🔵 Переплата'
        };

        function fmtMoney(n, cur) {
            if (n === null || n === undefined || n === '') return null;
            var v = Number(n);
            if (!isFinite(v)) return null;
            return v.toFixed(2) + (cur ? ' ' + cur : '');
        }
        function buildPaymentStatus(r) {
            var parts = [];
            var cur = r.payment_currency || '';
            var total = fmtMoney(r.total_amount, cur);
            if (total) parts.push('Сума: ' + total);
            var debt = fmtMoney(r.debt, cur);
            if (debt) parts.push('Борг: ' + debt);
            return parts.join(' · ');
        }

        function scanTTN(ttn) {
            if (!TENANT_ID) {
                handleScanResult(ttn, { ok: false, error: 'Сесія не знайдена. Увійдіть в CRM.' });
                return;
            }
            if (!SCAN_MODE) {
                handleScanResult(ttn, { ok: false, error: 'Оберіть режим перед скануванням' });
                return;
            }

            if (SCAN_MODE === 'check') {
                // Read-only peek: no state change, no audit log. Per product
                // decision, Check mode does not touch package_scan_log.
                sb.rpc('peek_ttn', {
                    p_tenant_id: TENANT_ID,
                    p_ttn: ttn
                }).then(function(result) {
                    if (result.error) {
                        handleScanResult(ttn, { ok: false, mode: 'check', error: result.error.message });
                        return;
                    }
                    var r = result.data || {};
                    if (!r.ok) {
                        handleScanResult(ttn, { ok: false, mode: 'check', error: r.error || 'Невідома помилка' });
                        return;
                    }
                    handleScanResult(ttn, {
                        ok: true,
                        mode: 'check',
                        payment_status: r.payment_status,
                        payment_currency: r.payment_currency,
                        total_amount: r.total_amount,
                        deposit: r.deposit,
                        debt: r.debt
                    });
                });
                return;
            }

            // Scan mode → auto state-machine RPC. Direction is hard-coded to
            // UA→EU; the picker was removed by product decision (all new
            // scans on intake belong to the Ukraine→Europe leg).
            sb.rpc('scan_ttn', {
                p_tenant_id: TENANT_ID,
                p_ttn: ttn,
                p_direction: DEFAULT_DIRECTION,
                p_user: USER_LOGIN
            }).then(function(result) {
                if (result.error) {
                    handleScanResult(ttn, { ok: false, mode: 'scan', error: result.error.message });
                    return;
                }
                var r = result.data || {};
                if (!r.ok) {
                    handleScanResult(ttn, {
                        ok: false,
                        mode: 'scan',
                        error: (r.error || 'Невідома помилка') +
                               (r.status ? ' (поточний: ' + (STATUS_LABEL[r.status] || r.status) + ')' : '')
                    });
                    return;
                }
                handleScanResult(ttn, {
                    ok: true,
                    mode: 'scan',
                    type: r.type,
                    pkg_id: r.pkg_id,
                    status: r.status,
                    prev_status: r.prev_status,
                    payment_status: r.payment_status,
                    total_amount: r.total_amount,
                    deposit: r.deposit,
                    debt: r.debt
                });
            });
        }

        function handleScanResult(ttn, res) {
            var variant = 'error', icon = '❌', label = 'Помилка', statusTxt = '';

            if (res && res.ok) {
                if (res.mode === 'check') {
                    // Check mode: show ONLY payment status + amounts. No name,
                    // no route (per product spec — it's for payment reconciliation).
                    variant = 'already';
                    icon = '💰';
                    label = PAYMENT_LABEL[res.payment_status] ||
                            (res.payment_status ? '💰 ' + res.payment_status : '💰 Оплата');
                    statusTxt = buildPaymentStatus(res);
                } else if (res.type === 'found') {
                    // Auto-transitioned (received→checked, checked→delivered, …)
                    variant = 'success'; icon = '✅';
                    label = STATUS_LABEL[res.status] || 'Оновлено';
                    statusTxt = buildPaymentStatus(res);
                } else if (res.type === 'already') {
                    variant = 'already'; icon = 'ℹ️';
                    label = 'Вже: ' + (STATUS_LABEL[res.status] || res.status || '—');
                    statusTxt = buildPaymentStatus(res);
                } else if (res.type === 'new') {
                    variant = 'created'; icon = '🆕';
                    label = 'Нова посилка';
                    statusTxt = 'Прийнято';
                    // Box-count modal only on fresh creation.
                    openBoxModal(ttn, res.pkg_id);
                } else if (res.type === 'rejected') {
                    variant = 'warn'; icon = '⚠️'; label = 'Відхилено';
                    statusTxt = 'Статус: Відхилено';
                } else {
                    variant = 'success'; icon = '✅'; label = 'OK';
                }
            } else {
                statusTxt = (res && res.error) || 'Невідома помилка';
            }

            addToHistory(ttn, variant, statusTxt);
            document.getElementById('mainBtn').style.display = 'block';
            sessionCounter += 1;
            document.getElementById('counterScanned').textContent = '📊 ' + sessionCounter;

            showToast({ variant: variant, icon: icon, label: label, value: ttn, status: statusTxt });

            setTimeout(function() {
                document.getElementById('resultToast').classList.remove('show');
            }, 2500);
        }

        // ==== BOX-COUNT MODAL ====
        // Opened only when scan_ttn returns type:'new' (package was just created).
        // Writes item_count back via REST PATCH (anon key; RLS disabled on this project).
        var boxModalPkg = null;
        function openBoxModal(ttn, pkg_id) {
            if (!pkg_id) return;
            boxModalPkg = pkg_id;
            document.getElementById('boxModalTtn').textContent = ttn;
            document.getElementById('boxOther').value = '';
            document.getElementById('boxModal').classList.add('show');
        }
        function closeBoxModal() {
            document.getElementById('boxModal').classList.remove('show');
            boxModalPkg = null;
        }
        function pickBoxCount(n) { saveBoxCount(n); }
        function pickBoxOther() {
            var v = parseInt(document.getElementById('boxOther').value, 10);
            if (!v || v < 1 || v > 999) return;
            saveBoxCount(v);
        }
        function saveBoxCount(n) {
            var pkg = boxModalPkg;
            if (!pkg || !TENANT_ID) { closeBoxModal(); return; }
            var url = SUPABASE_URL + '/rest/v1/packages' +
                      '?tenant_id=eq.' + encodeURIComponent(TENANT_ID) +
                      '&pkg_id=eq.' + encodeURIComponent(pkg);
            fetch(url, {
                method: 'PATCH',
                headers: {
                    apikey: SUPABASE_ANON_KEY,
                    Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                    'Content-Type': 'application/json',
                    Prefer: 'return=minimal'
                },
                body: JSON.stringify({ item_count: n })
            }).catch(function(){}).finally(function(){
                closeBoxModal();
            });
        }

        function showToast(opts) {
            var t = document.getElementById('resultToast');
            t.className = 'result-toast';
            if (opts.variant) t.classList.add(opts.variant);
            document.getElementById('toastIcon').textContent = opts.icon || '✅';
            document.getElementById('toastLabel').textContent = opts.label || '';
            document.getElementById('toastValue').textContent = opts.value || '';
            document.getElementById('toastStatus').textContent = opts.status || '';
            t.classList.add('show');
        }

        function mainBtnClick() {
            if (!isScanning || !isPaused) return;
            scanner.resume();
            isPaused = false;
            document.getElementById('resultToast').classList.remove('show');
            document.getElementById('mainBtn').style.display = 'none';
        }

        function stopScan() {
            if (!scanner || !isScanning) return;
            scanner.stop().then(function() {
                isScanning = false;
                isPaused = false;
                document.getElementById('scanFrame').style.display = 'none';
                document.getElementById('topbar').style.display = 'none';
                document.getElementById('bottombar').style.display = 'none';
                document.getElementById('modePill').classList.remove('show');
                document.getElementById('resultToast').classList.remove('show');
                document.getElementById('startScreen').classList.remove('hidden');
            }).catch(function() {});
        }

        function addToHistory(code, variant, status) {
            var time = new Date().toTimeString().substring(0, 8);
            scanHistory.unshift({ code: code, time: time, variant: variant || '', status: status || '' });
            if (scanHistory.length > 50) scanHistory.pop();
            renderHistory();
        }

        function variantDot(v) {
            var c = '#64748b';
            if (v === 'success') c = '#10b981';
            else if (v === 'warn') c = '#f59e0b';
            else if (v === 'created') c = '#8b5cf6';
            else if (v === 'error') c = '#ef4444';
            else if (v === 'already') c = '#64748b';
            return '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c+';margin-right:6px;flex-shrink:0;"></span>';
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, function(ch) {
                return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch];
            });
        }

        function renderHistory() {
            var list = document.getElementById('historyList');
            if (scanHistory.length === 0) {
                list.innerHTML = '<div class="history-empty">Поки порожньо</div>';
                return;
            }
            list.innerHTML = scanHistory.map(function(item) {
                return '<div class="history-item" style="flex-direction:column;align-items:stretch;">' +
                    '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">' +
                        '<span class="history-code">' + variantDot(item.variant) + escapeHtml(item.code) + '</span>' +
                        '<span class="history-time">' + item.time + '</span>' +
                    '</div>' +
                    (item.status ? '<div style="font-size:11px;color:rgba(255,255,255,0.55);margin-top:4px;">' + escapeHtml(item.status) + '</div>' : '') +
                '</div>';
            }).join('');
        }

        function clearHistory() {
            scanHistory = [];
            sessionCounter = 0;
            document.getElementById('counterScanned').textContent = '📊 0';
            renderHistory();
        }

        function openHistory() {
            document.getElementById('historyDrawer').classList.add('open');
            document.getElementById('backdrop').classList.add('show');
        }

        function closeHistory() {
            document.getElementById('historyDrawer').classList.remove('open');
            document.getElementById('backdrop').classList.remove('show');
        }

        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isScanning) stopScan();
        });
    </script>
</body>
</html>
