<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Генератор іконок для клієнтів</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; }
        body { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; background: #f0f2f5; font-family: Montserrat, sans-serif; }
        h1 { font-size: 22px; color: #1a3a5e; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 24px; width: 100%; max-width: 500px; }
        .form-row input { flex: 1; padding: 12px 16px; font-size: 16px; font-weight: 700; border: 2px solid #d1d5db; border-radius: 12px; font-family: inherit; outline: none; }
        .form-row input:focus { border-color: #10b981; }
        .form-row button { padding: 12px 24px; font-size: 14px; font-weight: 800; background: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; white-space: nowrap; }
        .form-row button:hover { background: #059669; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 100%; margin-bottom: 20px; }
        .card p { font-size: 12px; color: #888; margin-bottom: 12px; }
        .card canvas { border: 1px solid #e2e8f0; border-radius: 12px; max-width: 100%; }
        .btn { display: inline-block; margin-top: 12px; padding: 12px 32px; font-size: 14px; font-weight: 700; background: #1a3a5e; color: white; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; }
        .btn:hover { background: #0d1f3c; }
        .hidden { display: none; }
        .note { color: #888; font-size: 12px; margin-top: 16px; max-width: 500px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<h1>Генератор іконок для клієнтів</h1>
<p class="subtitle">Введи назву компанії — отримай іконку для PWA (iPhone + Android)</p>

<div class="form-row">
    <input type="text" id="companyName" placeholder="Назва компанії, напр. Fly" autofocus>
    <button onclick="generate()">Згенерувати</button>
</div>

<div id="results" class="hidden">
    <div class="card">
        <p>Універсальна іконка 512x512 (iPhone + Android)</p>
        <canvas id="icon512" width="512" height="512"></canvas>
        <br><button class="btn" onclick="dl()">Скачати PNG</button>
    </div>

    <p class="note">
        1. Скачай іконку<br>
        2. Залий на хостинг в папку <b>/logos/</b><br>
        3. В адмінці встав URL в поле <b>Logo URL</b>
    </p>
</div>

<script>
function generate() {
    var name = document.getElementById('companyName').value.trim().toUpperCase();
    if (!name) return;

    document.fonts.ready.then(function() {
        drawIcon('icon512', 512, name);
        document.getElementById('results').classList.remove('hidden');
    });
}

document.getElementById('companyName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generate();
});

function drawIcon(canvasId, size, name) {
    var c = document.getElementById(canvasId);
    var ctx = c.getContext('2d');

    // Solid dark blue background (OS applies its own rounded mask)
    ctx.fillStyle = '#1a3a5e';
    ctx.fillRect(0, 0, size, size);

    // Bus emoji
    ctx.font = (size * 0.28) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🚐', size / 2, size * 0.30);

    // Company name — white, auto-sized to fit
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var maxW = size * 0.85;
    var fontSize = size * 0.18;
    ctx.font = '800 ' + fontSize + 'px Montserrat, Arial, sans-serif';
    while (ctx.measureText(name).width > maxW && fontSize > size * 0.06) {
        fontSize -= 1;
        ctx.font = '800 ' + fontSize + 'px Montserrat, Arial, sans-serif';
    }
    ctx.fillText(name, size / 2, size * 0.58);

    // "CRM" in green
    ctx.fillStyle = '#10b981';
    ctx.font = '800 ' + (size * 0.10) + 'px Montserrat, Arial, sans-serif';
    ctx.fillText('CRM', size / 2, size * 0.76);
}

function dl() {
    var name = document.getElementById('companyName').value.trim().toLowerCase().replace(/\s+/g, '-') || 'icon';
    var c = document.getElementById('icon512');
    var a = document.createElement('a');
    a.download = name + '-512.png';
    a.href = c.toDataURL('image/png');
    a.click();
}
</script>
</body>
</html>
