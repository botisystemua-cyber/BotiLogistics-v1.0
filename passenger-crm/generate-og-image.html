<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Генератор іконок для клієнтів</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; }
        body { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; background: #f0f2f5; font-family: Montserrat, sans-serif; }
        h1 { font-size: 22px; color: #1a3a5e; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 24px; width: 100%; max-width: 500px; }
        .form-row input { flex: 1; padding: 12px 16px; font-size: 16px; font-weight: 700; border: 2px solid #d1d5db; border-radius: 12px; font-family: inherit; outline: none; }
        .form-row input:focus { border-color: #10b981; }
        .form-row button { padding: 12px 24px; font-size: 14px; font-weight: 800; background: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; white-space: nowrap; }
        .form-row button:hover { background: #059669; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; width: 100%; max-width: 800px; margin-bottom: 24px; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .card h3 { font-size: 14px; color: #1a3a5e; margin-bottom: 4px; }
        .card p { font-size: 11px; color: #888; margin-bottom: 12px; }
        .card canvas { border: 1px solid #e2e8f0; border-radius: 12px; max-width: 100%; }
        .btn { display: inline-block; margin-top: 10px; padding: 10px 20px; font-size: 13px; font-weight: 700; background: #1a3a5e; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; }
        .btn:hover { background: #0d1f3c; }
        .btn-all { padding: 14px 36px; font-size: 15px; background: #10b981; border-radius: 12px; }
        .btn-all:hover { background: #059669; }
        .hidden { display: none; }
        .note { color: #888; font-size: 12px; margin-top: 20px; max-width: 500px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<h1>Генератор іконок для клієнтів</h1>
<p class="subtitle">Введи назву компанії — отримай іконки для PWA</p>

<div class="form-row">
    <input type="text" id="companyName" placeholder="Назва компанії, напр. Fly" autofocus>
    <button onclick="generate()">Згенерувати</button>
</div>

<div id="results" class="hidden">
    <div class="grid">
        <div class="card">
            <h3>icon-192.png</h3>
            <p>Android / PWA іконка</p>
            <canvas id="icon192" width="192" height="192"></canvas>
            <br><button class="btn" onclick="dl('icon192','icon-192.png')">Скачати</button>
        </div>
        <div class="card">
            <h3>icon-512.png</h3>
            <p>PWA Splash / Store</p>
            <canvas id="icon512" width="512" height="512"></canvas>
            <br><button class="btn" onclick="dl('icon512','icon-512.png')">Скачати</button>
        </div>
    </div>

    <div style="text-align:center; margin-bottom: 20px;">
        <button class="btn btn-all" onclick="downloadBoth()">Скачати обидва</button>
    </div>

    <p class="note">
        1. Скачай іконки<br>
        2. Залий на хостинг (напр. в папку <b>/logos/</b>)<br>
        3. Скопіюй URL і встав в адмінці в поле <b>Logo URL</b>
    </p>
</div>

<script>
function generate() {
    var name = document.getElementById('companyName').value.trim().toUpperCase();
    if (!name) return;

    document.fonts.ready.then(function() {
        drawIcon('icon192', 192, name);
        drawIcon('icon512', 512, name);
        document.getElementById('results').classList.remove('hidden');
    });
}

document.getElementById('companyName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generate();
});

function drawIcon(canvasId, size, name) {
    var c = document.getElementById(canvasId);
    var ctx = c.getContext('2d');

    // ── Dark blue background ──
    ctx.fillStyle = '#1a3a5e';
    ctx.fillRect(0, 0, size, size);
    // Rounded corners mask
    ctx.globalCompositeOperation = 'destination-in';
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.18);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    // ── Decorative subtle circles (like OG image) ──
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath();
    ctx.arc(size * 0.8, size * 0.15, size * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.15, size * 0.85, size * 0.2, 0, Math.PI * 2);
    ctx.fill();

    // ── Green accent line at top ──
    ctx.fillStyle = '#10b981';
    ctx.fillRect(0, 0, size, size * 0.02);

    // ── Bus emoji ──
    ctx.font = (size * 0.28) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🚐', size / 2, size * 0.30);

    // ── Company name (auto-size to fit) ──
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Start with large font, shrink until it fits within 85% of icon width
    var maxW = size * 0.85;
    var fontSize = size * 0.18;
    ctx.font = '800 ' + fontSize + 'px Montserrat, Arial, sans-serif';
    while (ctx.measureText(name).width > maxW && fontSize > size * 0.06) {
        fontSize -= 1;
        ctx.font = '800 ' + fontSize + 'px Montserrat, Arial, sans-serif';
    }
    ctx.fillText(name, size / 2, size * 0.58);

    // ── "CRM" subtitle in green ──
    ctx.fillStyle = '#10b981';
    ctx.font = '800 ' + (size * 0.10) + 'px Montserrat, Arial, sans-serif';
    ctx.fillText('CRM', size / 2, size * 0.76);

    // ── Green accent line at bottom ──
    ctx.fillStyle = '#10b981';
    ctx.fillRect(0, size - size * 0.02, size, size * 0.02);
}

function dl(canvasId, filename) {
    var c = document.getElementById(canvasId);
    var a = document.createElement('a');
    a.download = filename;
    a.href = c.toDataURL('image/png');
    a.click();
}

function downloadBoth() {
    dl('icon192', 'icon-192.png');
    setTimeout(function() { dl('icon512', 'icon-512.png'); }, 300);
}
</script>
</body>
</html>
